<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cinephile's Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

    /* ═══════════════════════════════════════════════════════════
       CSS VARIABLES
       ═══════════════════════════════════════════════════════════ */
    :root {
      --bg: #070B19;
      --surface: #0B1224;
      --elevated: #111A30;
      --border: #1E293B;
      --accent: #D4AF37;
      --accent-dim: #A8862A;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-tertiary: #64748B;
      --overlay: rgba(7, 11, 25, 0.88);
      --modal-overlay: rgba(7, 11, 25, 0.90);
      --card-hover-overlay: linear-gradient(to top, rgba(7, 11, 25, 0.95) 0%, rgba(7, 11, 25, 0.6) 50%, transparent 100%);
      --shadow-card: 0 10px 40px rgba(0, 0, 0, 0.8);
      --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.9);
      --radius: 8px;
      --radius-lg: 16px;
      /* Typography */
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-serif: 'Playfair Display', ui-serif, Georgia, serif;
      --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #F1F5F9;
      --elevated: #E2E8F0;
      --border: #CBD5E1;
      --text-primary: #0F172A;
      --text-secondary: #334155;
      --text-tertiary: #64748B;
      --overlay: rgba(248, 250, 252, 0.85);
      --modal-overlay: rgba(15, 23, 42, 0.80);
      --card-hover-overlay: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.5) 50%, transparent 100%);
      --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.15);
      --shadow-modal: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      background-image: url('file:///C:/Users/sabiq/.gemini/antigravity/brain/0ce534b6-254e-4065-b70f-ecff9a768088/abstract_backdrop_1777239587612.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      position: relative;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0.88;
      z-index: -1;
      pointer-events: none;
      transition: background-color 0.3s ease;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    a {
      color: inherit;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* ─── Header ────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .header {
      background: rgba(7, 11, 25, 0.75);
    }

    [data-theme="light"] .header {
      background: rgba(248, 250, 252, 0.85);
    }

    .header__brand {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .header__title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }

    .header__count {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-wrap {
      width: 260px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      padding: 8px 12px 8px 32px;
      transition: var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
      background: var(--bg);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 175, 55, 0.1);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }

    /* ─── Controls Bar ──────────────────────────────────────── */
    .controls {
      position: sticky;
      top: 60px;
      z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .controls::-webkit-scrollbar {
      display: none;
    }

    [data-theme="dark"] .controls {
      background: rgba(7, 11, 25, 0.75);
    }

    [data-theme="light"] .controls {
      background: rgba(248, 250, 252, 0.85);
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 7px 12px;
      transition: var(--transition);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .dropdown-btn:hover,
    .dropdown-btn.is-active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 175, 55, 0.05);
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 100;
      background: rgba(17, 26, 48, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      min-width: 200px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-5px);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-card);
      max-height: 60vh;
      overflow-y: auto;
    }

    .dropdown-menu.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown--right .dropdown-menu {
      left: auto;
      right: 0;
    }

    .filter-badge {
      background: var(--accent);
      color: #070B19;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 20px;
      line-height: 1.4;
      display: inline-block;
    }

    .clear-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-tertiary);
      font-size: 0.75rem;
      padding: 6px 10px;
      transition: var(--transition);
      cursor: pointer;
    }

    .clear-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .filter-group--full {
      grid-column: 1 / -1;
    }

    .filter-group__title {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.6rem;
    }

    .filter-checks {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .filter-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-check:hover {
      color: var(--text-primary);
    }

    .filter-check input[type="checkbox"] {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 400;
      padding: 4px 10px;
      transition: var(--transition);
      cursor: pointer;
    }

    .tag-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #070B19;
      font-weight: 500;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    /* ─── Custom Filter UI ──────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .filter-checks--grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .filter-badge-toggle {
      cursor: pointer;
    }

    .viewer-badge-ui {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.02);
      transition: var(--transition);
      opacity: 0.6;
    }

    .filter-badge-toggle:hover .viewer-badge-ui {
      opacity: 0.9;
      background: rgba(255, 255, 255, 0.05);
    }

    .filter-badge-toggle input:checked+.viewer-badge-ui {
      opacity: 1;
      border-color: currentColor !important;
      box-shadow: inset 0 0 10px currentColor, 0 0 10px currentColor;
    }

    .filter-row-toggle {
      cursor: pointer;
      display: block;
      margin-bottom: 0.3rem;
    }

    .filter-row-ui {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 4px;
      background: transparent;
      transition: var(--transition);
    }

    .filter-row-toggle:hover .filter-row-ui {
      background: rgba(255, 255, 255, 0.03);
    }

    .filter-row-indicator {
      width: 3px;
      height: 16px;
      border-radius: 2px;
      margin-right: 10px;
      opacity: 0.3;
      transition: var(--transition);
    }

    .filter-row-toggle input:checked+.filter-row-ui {
      background: rgba(255, 255, 255, 0.08);
    }

    .filter-row-toggle input:checked+.filter-row-ui .filter-row-indicator {
      opacity: 1;
      box-shadow: 0 0 8px currentColor;
    }

    .filter-row-label {
      flex-grow: 1;
      font-size: 0.8rem;
      opacity: 0.6;
      transition: var(--transition);
    }

    .filter-row-toggle input:checked+.filter-row-ui .filter-row-label {
      opacity: 1;
      font-weight: 500;
    }

    .critic-score-badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      opacity: 0.5;
    }

    .filter-row-toggle input:checked+.filter-row-ui .critic-score-badge {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-weight: 600;
    }

    .toggle-switch-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .toggle-switch-track {
      width: 36px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      position: relative;
      transition: var(--transition);
    }

    .toggle-switch-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text-secondary);
      border-radius: 50%;
      transition: var(--transition);
    }

    .toggle-switch-wrap input:checked+.toggle-switch-track {
      background: rgba(212, 175, 55, 0.3);
    }

    .toggle-switch-wrap input:checked+.toggle-switch-track::after {
      transform: translateX(16px);
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Year Range Slider */
    .year-range {
      padding: 0.25rem 0;
    }

    .year-range__labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .year-range__input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 2px 4px;
      width: 60px;
      font-size: 0.8rem;
      text-align: center;
      font-family: inherit;
    }

    .year-range__input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .range-wrap {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .range-slider {
      position: absolute;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      pointer-events: none;
      height: 4px;
    }

    .range-slider::-webkit-slider-runnable-track {
      background: var(--border);
      height: 4px;
      border-radius: 2px;
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      pointer-events: all;
      cursor: pointer;
      margin-top: -6px;
    }

    .range-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      pointer-events: all;
      cursor: pointer;
    }

    /* ─── Main Layout ───────────────────────────────────────── */
    .main {
      padding: 2rem;
    }

    /* ─── Film Grid ─────────────────────────────────────────── */
    .film-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
    }

    @media (max-width: 1399px) {
      .film-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 1199px) {
      .film-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 899px) {
      .film-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 599px) {
      .film-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 399px) {
      .film-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ─── Film Card ─────────────────────────────────────────── */
    .film-card {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      box-shadow: var(--shadow-card);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .film-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.75);
    }

    .film-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .film-card__poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .film-card__fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B1224 0%, #111A30 50%, #070B19 100%);
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: -0.02em;
    }

    .film-card__overlay {
      position: absolute;
      inset: 0;
      background: var(--card-hover-overlay);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.75rem;
    }

    .film-card:hover .film-card__overlay {
      opacity: 1;
    }

    .film-card__badge {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--badge-color, var(--accent));
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      padding: 3px 7px;
      border-radius: 3px;
      border: 1px solid currentColor;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .film-card:hover .film-card__badge {
      opacity: 1;
    }

    .film-card__info {
      position: relative;
      z-index: 1;
    }

    .film-card__title {
      font-family: var(--font-serif);
      font-size: clamp(0.72rem, 1.2vw, 0.95rem);
      font-weight: 600;
      color: #F8FAFC;
      line-height: 1.3;
      margin-bottom: 0.2rem;
    }

    .film-card__title mark {
      background: transparent;
      color: var(--accent);
    }

    .film-card__year {
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ─── Empty State ───────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 6rem 2rem;
      text-align: center;
    }

    .empty-state__symbol {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.3;
      letter-spacing: 0.3em;
    }

    .empty-state__title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .empty-state__sub {
      font-size: 0.875rem;
      color: var(--text-tertiary);
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      padding: 3rem 2rem;
      text-align: center;
      margin-top: 3rem;
      position: relative;
    }

    .footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
    }

    .footer__title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .footer__count {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    .footer__tag {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      margin-top: 0.4rem;
      opacity: 0.6;
    }

    /* ─── Modal Overlay ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-modal);
      position: relative;
      transform: scale(0.96) translateY(20px);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
      margin: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .modal-overlay.is-open .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal__close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      backdrop-filter: blur(4px);
    }

    .modal__close:hover {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
    }

    /* ─── Modal Hero ────────────────────────────────────────── */
    .modal__hero {
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .modal__hero-bg {
      position: absolute;
      inset: -10%;
      background-image: var(--hero-bg);
      background-size: cover;
      background-position: center top;
      filter: blur(8px) brightness(0.35) saturate(1.2);
      transform: scale(1.1);
    }

    .modal__hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(11, 18, 36, 0.6) 60%, var(--surface) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .modal__hero-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 2rem;
      padding: 2.5rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .modal__hero-inner {
        grid-template-columns: 1fr;
        gap: 1.25rem;
        padding: 1.5rem;
      }
    }

    /* Modal Poster */
    .modal__poster-col {
      flex-shrink: 0;
    }

    .modal__poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .modal__poster-fallback {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1714 0%, #252118 100%);
      font-family: var(--font-serif);
      font-size: 4rem;
      font-weight: 600;
      color: var(--text-tertiary);
    }

    /* Modal Info */
    .modal__info-col {
      min-width: 0;
    }

    .modal__title-wrap {
      margin-bottom: 0.4rem;
    }

    .modal__title-logo {
      max-width: 340px;
      max-height: 100px;
      object-fit: contain;
      object-position: left;
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8)) drop-shadow(0 2px 10px rgba(0, 0, 0, 0.9));
    }

    .modal__title-text {
      font-family: var(--font-serif);
      font-size: 1.85rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fff;
    }

    .modal__orig-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.6rem;
    }

    .modal__orig-title em {
      font-style: italic;
      margin-left: 0.4em;
      font-size: 0.88em;
    }

    .modal__tagline {
      font-style: italic;
      font-size: 0.875rem;
      color: var(--accent);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .modal__meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 0.75rem;
    }

    .modal__meta-sep {
      opacity: 0.4;
    }

    .modal__runtime-item strong {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 400;
      font-size: 0.7em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .modal__pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .pill--lang {
      background: rgba(248, 250, 252, 0.1);
      color: rgba(248, 250, 252, 0.75);
      border: 1px solid rgba(248, 250, 252, 0.15);
      backdrop-filter: blur(4px);
    }

    .pill--genre {
      background: rgba(212, 175, 55, 0.15);
      color: #D4AF37;
      border: 1px solid rgba(212, 175, 55, 0.25);
      backdrop-filter: blur(4px);
    }

    .modal__viewer-rating {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.6rem 0;
    }

    .viewer-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1.5px solid;
    }

    .viewer-badge--u {
      color: #10B981;
      border-color: #10B981;
      background: rgba(16, 185, 129, 0.1);
    }

    .viewer-badge--pg {
      color: #3B82F6;
      border-color: #3B82F6;
      background: rgba(59, 130, 246, 0.1);
    }

    .viewer-badge--t-13 {
      color: #F59E0B;
      border-color: #F59E0B;
      background: rgba(245, 158, 11, 0.1);
    }

    .viewer-badge--m-16 {
      color: #F97316;
      border-color: #F97316;
      background: rgba(249, 115, 22, 0.1);
    }

    .viewer-badge--r-18 {
      color: #EF4444;
      border-color: #EF4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .viewer-badge--x {
      color: #991B1B;
      border-color: #991B1B;
      background: rgba(153, 27, 27, 0.12);
    }

    .modal__descriptors {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
    }

    .modal__trailer-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #070B19;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: var(--radius);
      text-decoration: none;
      margin-top: 0.75rem;
      transition: var(--transition);
      letter-spacing: 0.02em;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .modal__trailer-btn:hover {
      background: var(--text-primary);
      color: #070B19;
      box-shadow: 0 6px 20px rgba(248, 250, 252, 0.4);
    }

    /* ─── Modal Sections ────────────────────────────────────── */
    .modal__cast,
    .modal__filmmakers,
    .modal__awards,
    .modal__verdict {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
    }

    .modal__section-title {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
    }

    .modal__filmmakers {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .modal__crew-group {
      flex: 1;
      min-width: 160px;
    }

    .modal__crew-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* Cast scroll */
    .modal__cast-scroll {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .modal__cast-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .modal__cast-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal__cast-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Person Cards */
    .person-card {
      flex-shrink: 0;
      text-align: center;
      width: 88px;
    }

    .person-card__photo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 0.5rem;
      background: var(--elevated);
      position: relative;
    }

    .person-card__photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .person-card__photo--crew {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    .person-card__photo-wrap--crew {
      width: 80px;
      height: 80px;
    }

    .person-card__fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--elevated), var(--border));
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-tertiary);
      border-radius: 50%;

    .person-card__name {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.15rem;

      font-size: 0.65rem;
      font-style: italic;
      color: var(--text-tertiary);
      line-height: 1.3;
    }

    .person-card .person-card__photo-wrap {
      width: 88px;
      height: 88px;
    }

      flex-wrap: wrap;
      gap: 1.5rem 3rem;

    .awards-group {

    }

    .awards-group__title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.6rem;

      gap: 0.5rem;
      margin-bottom: 0.5rem;

      margin-top: 1px;
      flex-shrink: 0;

      opacity: 0.5;
    }

    .award-item__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .award-item__category {
      font-size: 0.8rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .award-item--nominated .award-item__category {
      color: var(--text-secondary);
    }

    .award-item__meta {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    .award-item--won .award-item__category {
      font-weight: 500;
    }

    /* ─── Critic Verdict ────────────────────────────────────── */
    .modal__verdict {
      background: var(--elevated);
      border-left: 3px solid var(--verdict-border, var(--accent));
      padding-left: calc(2rem - 3px);
    }

    .modal__verdict-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--verdict-color, var(--accent));
      background: var(--verdict-bg, rgba(212, 175, 55, 0.1));
      border: 1.5px solid var(--verdict-border, var(--accent));
      padding: 5px 14px;
      border-radius: 3px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
    }

    .modal__review {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.88;
      color: var(--text-primary);
      max-width: 68ch;
    }

    .modal__review p {
      margin-bottom: 1.25em;
    }

    .modal__review p:last-child {
      margin-bottom: 0;
    }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header {
        padding: 0 1rem;
      }

      .controls {
        padding: 0.6rem 1rem;
      }

      .main {
        padding: 1rem;
      }

      .film-grid {
        gap: 0.65rem;
      }

      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }

      .modal-content {
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        margin: 0;
      }

      .modal__hero-inner {
        padding: 1.25rem;
        gap: 1rem;
      }

      .modal__title-text {
        font-size: 1.4rem;
      }

      .modal__cast,
      .modal__filmmakers,
      .modal__awards,
      .modal__verdict {
        padding: 1.25rem;
      }

      .modal__filmmakers {
        flex-direction: column;
        gap: 1.25rem;
      }

      .sort-group {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .header__title {
        font-size: 1rem;
      }

      .controls {
        gap: 0.5rem;
      }

      .filter-grid {
        padding: 1rem;
        gap: 1rem;
      }
    }
  </style>
</head>

          mood: ["elegiac", "wry", "disquieting"],
          fullReview: "Sisters Nora and Agnes are abruptly pulled back into the chaotic orbit of their estranged father, Gustav, a once-revered auteur director desperate to orchestrate his cinematic resurrection. When Nora, a fiercely independent and highly acclaimed stage actor, decisively rejects his offer to star in his intensely personal new project, Gustav retaliates with the petulance of a wounded god. He callously casts an eager, young Hollywood starlet in the role explicitly written for and about his daughter. As the cameras roll and production begins to consume their lives, the two sisters find themselves drawn into a surreal, inescapable collision of unhealed family trauma, artistic exploitation, and decades of unresolved resentments.\n\nJoachim Trier and his longtime co-writer Eskil Vogt have spent decades meticulously mapping the existential anxieties and quiet despair of the Scandinavian middle class, but here they turn their surgical precision toward the very act of storytelling itself. The film operates on two distinct frequencies, succeeding brilliantly as both a biting, inside-baseball satire of the cinematic ego and a profoundly moving exploration of familial neglect. It asks an age-old, deeply uncomfortable question: is monumental art ever worth the human collateral required to forge it? The picture leans into the uncomfortable reality that terrible parents can make transcendent art, and that forgiveness from their children is not always a necessary, or even possible, conclusion.\n\nStellan Skarsgård delivers a monolithic, towering performance as Gustav. He radiates the exact kind of weaponized, intellectual charm that allows brilliant men to leave a trail of emotional wreckage behind them without ever having to apologize or face the consequences. Skarsgård refuses to play Gustav as a simple villain. Instead, he constructs a tragic, pathetic narcissist who genuinely, foolishly believes that capturing truth on a camera lens somehow absolves him of completely ignoring it in his own living room. The comedic timing he brings to the character’s moments of immense self-pity is nothing short of masterful.\n\nOpposite him, Renate Reinsve continues to prove that she is one of the most intuitively gifted, fascinating actors working today. Her portrayal of Nora is tightly wound, vibrating constantly with a toxic cocktail of disgust, righteous anger, and a desperate, buried yearning for a father who only knows how to communicate his love through a viewfinder. Elle Fanning, stepping into the perilous role of the eager American starlet Rachel, provides a brilliant and necessary counter-melody. Fanning’s wide-eyed earnestness slowly and methodically peels back to reveal a sharp, calculating, and opportunistic edge, perfectly highlighting the predatory nature of the international film industry. Inga Ibsdotter Lilleaas anchors the supporting cast as Agnes, the seemingly stable sibling whose own psychological cracks begin to aggressively splinter when she is forced to mediate the war between Nora and Gustav.\n\nKasper Tuxen’s cinematography captures Oslo in a crisp, melancholic autumnal light. He creates a visual language that relies heavily on stark contrasts, deliberately juxtaposing the warm, intimate, physically grounded chaos of the theater world Nora inhabits with the cold, imposing, deeply artificial environments of Gustav’s film sets. The score by Hania Rani adds a delicate, haunting texture that elevates the emotional stakes without ever attempting to manipulate the audience.\n\nThe narrative pacing occasionally meanders during the second act, specifically when the script takes a slightly too deep, indulgent dive into the secondary mechanics of the film-within-a-film production. However, it course-corrects brilliantly and brutally in the final stretch. The climax strips away all the cinematic artifice, forcing the characters into a space where no script can save them. What remains with the viewer is the uneasy, deafening silence of a fractured family that simply cannot be neatly edited into a comfortable resolution. This is a bruised, beautiful, and deeply cynical portrait of inheritance—not of wealth or talent, but of inescapable emotional debt."

        review: {
          themes: ["surveillance", "resistance", "disappearance", "complicity", "fatherhood", "dictatorship", "identity", "carnival"],
          mood: ["suffocating", "electric", "disquieting"],
          fullReview: "Brazil, 1977. The military dictatorship is eight years into its long grip on the country, Carnival is consuming Recife in noise and sequins and heat, and a man who goes by at least two names is trying not to be found. Marcelo — or Armando, or whatever name is most useful at a given checkpoint — is a technology expert with a past that the state would very much like to account for. He has come to this city during its most chaotic week to find his son. What he finds instead is that the chaos offers neither the cover he needs nor the escape he imagined.\n\nKleber Mendonça Filho has spent his career building a cinema that is inseparable from Recife — its architecture, its class tensions, its particular quality of light and noise and threat. With The Secret Agent, he does something he has not quite done before: he borrows the skeleton of genre filmmaking, the fugitive thriller, the cat-and-mouse procedural, and fills it with the specific political weight of a country whose recent history remains a wound that has not been allowed to fully close. The result is a film that functions as a legitimate thriller — there are chases, there are close calls, there are rooms where the wrong person says the wrong thing — while simultaneously refusing to let genre machinery replace political consciousness.\n\nWagner Moura carries the film inside his body as much as on his face. This is a performance that requires Moura to be simultaneously hyperalert and deliberately opaque, a man who has learned to disappear even while standing in a crowd. The particular skill of it is how little Moura performs: the watchfulness is in the eyes, the tension in the way he occupies doorways, the calculation in every conversation where the wrong word would end everything. It is the kind of work that looks simple and is anything but, and the film earns its weight almost entirely through the credibility Moura brings to a man for whom every encounter is a potential betrayal.\n\nCarnival is not backdrop here — it is an argument. Mendonça Filho understands that a state celebrating excess while conducting disappearances in the adjacent dark is not a paradox but a strategy, and he shoots the festival with a kind of gorgeous menace that refuses easy beauty. The noise that should mask things instead amplifies them. The crowd that should provide anonymity becomes its own surveillance. Evgenia Alexandrova's cinematography handles this with uncommon precision: the film feels simultaneously wide open — Recife breathing and burning and dancing — and completely sealed, as if the walls of a particular historical moment have closed around everyone in the frame.\n\nThe supporting cast is populated by faces that belong to this story rather than to any genre template. Maria Fernanda Cândido brings a cool, controlled intelligence to her scenes that complicates Moura's every interaction. Gabriel Leone finds the precise register of a young man who understands more than he has been told. And Udo Kier's presence — as a German contact who exists in the film's margins — functions as a quiet reminder that authoritarian networks have no national boundaries. The international dimensions of the dictatorship, propped up by Cold War alliances and quiet foreign participation, are embedded in the casting rather than spelled out in dialogue.\n\nAt 161 minutes, the film asks for patience, and most of what it asks for is returned. The longer stretches are not padding — they are about accumulation, about what it feels like to move through a city where every transaction carries risk, where time itself has become hostile. There are sequences in the final hour that achieve a specific kind of dread that the thriller genre almost never reaches because most thrillers are too interested in resolution. Mendonça Filho is interested in something else: what it costs to survive inside a machine built to prevent survival.\n\nThe film is dedicated, in spirit if not explicitly, to the people who did not make it through this particular period of Brazilian history — those who were detained, tortured, disappeared. The genre elements are not there to entertain audiences away from this reality. They are there to make it visceral, immediate, impossible to intellectualize into abstraction. A political film that is also genuinely tense is doing something harder than either a political film or a thriller alone. This one earns both descriptions.\n\nViewers who go in expecting clean resolution will find themselves in the wrong film. Viewers who understand that some histories do not resolve — they simply stop — will find one of the most purposeful works to emerge from Brazilian cinema in years."

          fullReview: "Phillip Vanderploeg is a middle-aged American actor stuck in Tokyo with a modest resumé, a dwindling bank account, and the particular kind of rootlessness that follows a person who has spent too long playing versions of someone else. When he stumbles into work at a rental family agency — a real phenomenon in Japan where people hire stand-ins for weddings, funerals, office events, anywhere a person needs family they do not have — he discovers something unexpected: he is genuinely good at it. Better at being someone else than he has been at being himself for years.\n\nDirector Hikari, working from a script she co-wrote with Stephen Blahut, treats this premise with more intelligence than its surface charm might suggest. Rental Family is not a fish-out-of-water comedy or a culture-clash film, though it has elements of both. What it actually is, underneath the warmth and the Tokyo streetscapes and the occasionally absurd professional situations, is a film about the serious human need to feel witnessed. The clients who hire Phillip — a man who wants a stranger to attend his mother's funeral, a family who needs a grandfather figure for a child's school day, a woman who simply wants someone to sit with her in a bar — are not lonely in any simple or pitiable sense. They have constructed what they need from available materials. Phillip is one of those materials, and the film watches with genuine curiosity as the transaction slowly becomes something else.\n\nBrendan Fraser gives his best performance in years here, and the comparison to his Oscar-winning work is instructive: where that role required maximalism, this one asks him to be still. Phillip is a man whose professional instinct is to fill space, and the film keeps catching him in moments where he stops doing that — where something real interrupts the performance and he does not immediately know what to do with it. Fraser handles these transitions without announcing them, and the restraint is the point. There is a quality of earned exhaustion in the performance, as if Phillip has spent so long being accommodating that genuine feeling has become the harder act.\n\nTakehiro Hira as Shinji Tada, Phillip's supervisor and eventually something more complicated than a colleague, anchors the Japanese side of the film with a precision that never strays into stereotype. Hira is playing a man who has made peace with the architecture of his own life — or believes he has — and the film watches that belief get quietly tested. Their dynamic, two men in the business of simulating connection who have both stopped noticing what they personally lack, is the film's most interesting relationship, and Hikari gives it room to develop without rushing it toward resolution.\n\nThe score by Jónsi and Alex Somers does exactly what a score should do in a film like this: it makes the spaces between scenes feel inhabited. Their work tends toward the delicate end of things, never overwhelming a moment that is trying to breathe. Takuro Ishizaka's cinematography captures Tokyo with affection but without tourism — this is a city where people live their complicated lives, not a backdrop.\n\nWhere Rental Family is less sure of itself is in its structure. The episodic nature of Phillip's assignments, which gives the film much of its variety and humor, also makes the middle section feel slightly meandering. Several of the client scenarios are excellent on their own terms; not all of them deepen the central argument. The film earns its ending but works a little harder to get there than it should.\n\nThese are real limitations, but they do not undo what the film does right, which is substantial. Hikari has made a film that takes seriously the idea that manufactured closeness might shade into the genuine article — not as a trick or a twist, but as a quiet, incremental truth about how people actually find their way toward each other. Anyone who has ever felt most themselves while playing a role will recognize something here. The film does not resolve that paradox. It just sits with it, warmly, for nearly two hours, which turns out to be enough."

          fullReview: "Marty Mauser wants to be the greatest ping pong player in the world. He is not currently great. He might never be. In Josh Safdie\'s first solo feature, this gap between what a man believes he is and what the world can verify forms the engine of everything — and Safdie, working with co-writer Ronald Bronstein, pushes Timothée Chalamet\'s young obsessive through New York City, London, and Japan without ever letting the question resolve into something comfortable.\n\nThe film announces itself on Safdie\'s frequency immediately: the handheld camera that always feels too close, the ambient city noise bleeding into scenes that should be quiet, the sense that every supporting character is running some private drama just offscreen. These are not borrowed habits — they are Safdie\'s genuine way of seeing, and they remain fully intact here without his brother Benny behind the camera. Whether the work is lesser for that absence is almost beside the point. Marty Supreme stands on its own.\n\nChalamet has always been an actor who performs even when he is being still — there is always something self-aware in him, some knowledge of being watched. Safdie has identified this quality and bent it into the character\'s spine. Marty Mauser is a man who has built himself entirely around an image of greatness that no one else can perceive, and Chalamet plays this condition with exhausting fidelity. The moments where the performance cracks — when someone who loves Marty refuses to see what he sees in himself — are the film\'s most honest and most difficult.\n\nThe New York sections have the cramped, sweaty texture Safdie does better than anyone working in American cinema. There is a richness to the peripheral characters — regulars, opponents, enablers — that comes from casting deep into the city\'s actual population rather than from central. Gwyneth Paltrow, as the well-appointed Kay Stone, brings a calibrated stillness that functions as an odd counterweight to the film\'s kinetic centre. Her relationship with Marty defies easy categorisation, and Paltrow lets that ambiguity breathe rather than resolve it with actorly choices. Fran Drescher as his mother conjures an entire history of missed connection in very little screen time. Odessa A\'zion as Rachel is the film\'s emotional pulse in the first half, and it is a genuine problem that the screenplay loses track of her when the international sections take over.\n\nThat international arc — London for a Wembley tournament, then Japan — opens the film up in ways that are both thrilling and slightly destabilising. Darius Khondji shoots the Japan sequences with an expanded palette, and there is something piercing about watching a country receive ping pong with the seriousness Marty always believed the game deserved. The irony sits in the film quietly rather than being underlined.\n\nDaniel Lopatin\'s score never settles. It creates a low-grade pressure that functions less as mood music and more as a condition the characters have to exist inside.\n\nThe film is long enough that its structural weaknesses become visible. The middle New York section sags at points in ways that feel unresolved rather than deliberately unhurried, and the balance between characters tips unevenly when the plot begins to generate momentum. None of this is fatal. Safdie knows how to build toward images rather than conclusions, and the final one he lands on earns its ambiguity — though audiences wanting the question answered will leave the cinema hungry.\n\nMarty Supreme is not really about ping pong, and anyone expecting sports cinema in the conventional sense should look elsewhere. It is about the terrifying commitment required to believe in oneself past the point where the evidence supports it, and what that commitment costs the people standing nearby. That is not a small subject. A confident, occasionally great solo debut from a filmmaker who was already one of the most interesting working in America."

          mood: ["wry", "suffocating", "bitter"],
          fullReview: "Yoo Man-su has spent twenty-two years managing a paper mill. He is good at his job. Then the company restructures, which is a polite word for what amounts to a small, bloodless execution performed over a conference table. Back home, his daughter practices cello, his wife maintains the household budget with careful optimism, and the job listings he sends resumes to respond with silence. No Other Choice picks up right there — at the precise moment a reasonable man begins reasoning his way toward something unreasonable.\n\nPark Chan-wook has been waiting to make this film for years. The source material, a Donald Westlake crime novel from 1997, follows the same basic logic: a middle manager, humiliated by a market that has no use for him, identifies his competition for the few available positions in his field and begins eliminating them. The premise sounds operatic and absurd, and the novel delivers both, with the added discomfort of making the reader follow the protagonist\'s internal justifications so closely they start to feel reasonable. Park and his co-writers have transplanted this to contemporary South Korea, where the cultural weight of employment — as identity, as paternal duty, as social standing — makes the premise land with extra force.\n\nThe genius of the adaptation is how thoroughly it refuses to signal its own moral position. Park Chan-wook has always been a director more interested in the architecture of complicity than in clean verdicts, and here he builds a film that holds the audience\'s discomfort like water in cupped hands — never letting it spill, never letting it settle. Yoo Man-su\'s logic is presented whole, step by careful step, and the screenplay is meticulous enough that viewers find themselves understanding each decision even as something cold moves through them.\n\nLee Byung-hun carries almost every scene, and this is one of the more demanding performances of his career. The character requires two things simultaneously: perfect surface normalcy and the low hum of a man who has crossed a threshold he cannot uncross. Lee achieves this without apparent effort, which is to say the effort is completely hidden. There is a scene involving a job interview — conducted by a man who does not yet know what Man-su knows about him — that is almost unbearably tense precisely because both parties are being perfectly professional. The film has several such moments, where the comedy and the horror occupy exactly the same space.\n\nSon Ye-jin as Mi-ri, the wife, is given a role that demands she embody sustained, dignified unknowing, and she makes it ache. The distance between what the audience knows and what she knows is the film\'s engine, and Cho Young-wuk\'s score — elegantly restrained, occasionally punctuated by something almost jaunty — calibrates that distance with precision.\n\nPark Chan-wook remains one of cinema\'s most composed visual stylists, and the direction here channels that composure into something almost uncomfortably appropriate to the subject. There is a bureaucratic tidiness to the framing, a sense that the camera has organized this chaos into something comprehensible. Compositions are clean, exits are unhurried, consequences are filmed with the same attention as their causes. The effect is subtly destabilising in a way that feels particular to this director.\n\nAt two hours and twenty minutes, the film earns most of its length. There are sections in the second act where the rhythm slackens — a few scenes that make the same point twice — but these are minor complaints against a film working at a high level throughout.\n\nWhat lingers is the question the film refuses to answer for the audience: at what point, exactly, does a system that discards people bear responsibility for what those people do next? No Other Choice does not moralize. It builds its case with the same meticulous care as its protagonist builds his, then steps back and leaves the viewer holding the evidence. That is exactly the correct choice."

          mood: ["disquieting", "intimate", "austere"],
          fullReview: "A man is found dead in the snow at the base of the chalet where he lives with his German novelist wife and their eleven-year-old visually impaired son. The death could be a fall, a suicide, or a murder. The wife is put on trial. Her son is the only potential witness. What happens across the next two and a half hours is not the gradual revelation of what really occurred — Justine Triet is far too rigorous a filmmaker for that — but something stranger and more unsettling: the systematic dismantling of the very idea that a marriage, or a person, can ever be known.\n\nThe genius of the screenplay, which Triet wrote with Arthur Harari, is that it never cheats. There are no hidden witnesses, no convenient confessions, no forensic breakthroughs. The trial turns entirely on competing interpretations of the same evidence — the same arguments, the same recordings, the same silences — and the film trusts the audience to sit with the discomfort of genuine irresolution. What the prosecution sees as proof of character, the defense reframes as proof of its opposite. Both readings are coherent. Both are damning. The trial becomes a philosophical problem in the shape of a courtroom drama, and the courtroom becomes an autopsy of a relationship performed with the victim absent and the facts incomplete.\n\nSandra Hüller plays Sandra Voyter, and this is a performance that deserves to be discussed alongside the great ones. The character requires something almost impossible: Hüller must be legible enough that the audience keeps watching her, while remaining opaque enough that the question of her guilt stays genuinely open. She achieves this not through ambiguity as a technique — no strategic withholding, no meaningful glances — but through the specific quality of a woman who simply refuses to perform innocence for others. Sandra Voyter does not behave the way an innocent person might be expected to behave, and the film insists on examining why that expectation exists in the first place.\n\nMilo Machado-Graner as the son Daniel is one of the finest child performances in recent memory. The character is not a device — the blind child who might hold the truth — but a fully inhabited person navigating a loss that has no clean shape. His final scenes require an emotional weight that most adult actors struggle to carry, and he carries it without apparent strain.\n\nThe film is shot with a functional austerity that suits it exactly. Simon Beaufils keeps the camera attentive rather than expressive, which is the right choice — any overt visual style would tip the balance that Triet is working to maintain. The chalet in the French Alps feels claustrophobic even in its open spaces, a place where two people have slowly run out of room to be different people. The courtroom is rendered with the same neutrality: fluorescent and airless, a machine for producing verdicts rather than truth.\n\nThere is a recorded argument at the film\'s center — played in court, dissected by lawyers, heard by the jury and by the audience — that is one of the bravest setpieces in recent cinema. It goes on longer than comfort allows, covers more ground than a single scene usually does, and refuses to let either participant win cleanly. What it reveals about the marriage is everything and nothing. Two people in pain, doing damage, in a language that is not quite native to either of them. The film\'s preoccupation with language — who speaks which one, who loses precision in translation, who gains plausible deniability — runs through everything.\n\nThe Palme d\'Or was the correct verdict. Anatomy of a Fall is the kind of film that makes its genre feel insufficient to describe it."

        criticRating: "Exceptional",

          themes: ["power", "accountability", "narcissism", "complicity", "legacy", "performance", "predation"],
          mood: ["suffocating", "hypnotic", "unsettling"],
          fullReview: "Lydia Tár is, by every measurable standard, at the summit of the world. The first woman to serve as chief conductor of the Berlin Philharmonic, a celebrated composer, a bestselling author, a living monument to serious music — she is exactly the kind of figure that institutions construct their prestige around, and she knows it. As TÁR opens, she is preparing to record what should be the crowning achievement of her career: a complete Mahler Fifth. But something is already gathering at the edges. An assistant has gone quiet in a particular way. Emails have been forwarded to people who have no business receiving them. The foundations are shifting before the first crack is visible.\n\nTodd Field\'s film, his first in sixteen years, opens with an extended real-time interview — Lydia seated onstage at the New Yorker Festival, in conversation with the actual journalist Adam Gopnik. It lasts nearly ten minutes and it is one of the most audacious gambits in recent memory. No plot, no incident, just a character talking about music, power, and herself with the fluency of someone who has long since stopped distinguishing between the two. By the time the scene ends, viewers know exactly who Lydia Tár is — her brilliance, her vanity, the casual cruelty in how she commands every room she enters — and they have been given no easy instruction on how to feel about her.\n\nThat refusal to instruct is what separates TÁR from the film it could have lazily been. This is not a #MeToo fable with a satisfying arc. It does not move toward catharsis or justice in any conventional shape. What Field is more interested in — what makes the film genuinely disturbing — is the ecosystem that Tár inhabits: the assistants who enable her, the board members who protect their investment, the colleagues who look away, the institutions that confuse excellence with permission. The abuse of power here is not depicted as aberrant. It is shown to be structural, almost atmospheric, the natural condition of environments built around genius and prestige.\n\nCate Blanchett\'s performance is the kind that rewrites what a film performance can do. It is not built on moments of visible anguish or explosive release — the temptations of lesser work. It is built on comportment. The way Tár holds a baton when she is not conducting, like she is always half-conducting. The way she moves through an apartment she is thinking of buying, assessing it the way she assesses musicians — for what it might offer her. The way a flicker of awareness passes across her face when she realizes something has already gone wrong, replaced almost immediately by the cold resolution not to let it alter her stride. Blanchett does not play a villain. She plays a person who has organized the entire architecture of her life around the conviction that her gifts exempt her from ordinary obligations — and who is only now, and only partially, beginning to reckon with what that has cost other people.\n\nFlorian Hoffmeister\'s cinematography is immaculate in its restraint. Berlin is rendered in cool grays and institutional blues — beautiful spaces that feel like they belong to the occupation rather than the occupant. The camera does not editorialize. It simply watches, often from distances that feel clinical, as if the film itself is maintaining professional detachment from its subject. This visual neutrality is a moral choice, and a brave one.\n\nHildur Guðnadóttir\'s score — built around the Mahler that Tár is preparing — functions less as emotional guidance than as ironic counterpoint. The grandeur of the music against the smallness of the behavior driving the film\'s central crisis creates a dissonance that lingers long after the final scene.\n\nThe last act has divided audiences, and not without reason. The film\'s resolution is elliptical, resistant to the satisfactions most narratives earn through consequence. But considered alongside everything the film has spent two and a half hours establishing — the way institutions absorb damage, the way powerful people land on their feet, the way prestige migrates rather than disappears — the ending is the only honest one available. It is not comfortable. Neither is the rest of TÁR.\n\nThis is a film for viewers who do not need to be told what to think of the person they are watching — and who can tolerate spending nearly three hours in intimate proximity with someone genuinely difficult to like, and genuinely impossible to dismiss."

          mood: ["elegiac", "tender", "mournful"],
          fullReview: "Yusuke Kafuku is a stage actor and director who has spent two years not quite grieving his wife. Something happened between them — something he saw and chose not to address — and then she was gone before he had the chance to decide what to do about it. Now he drives to rehearsals alone, listening to her voice on tape, the cassette recordings she made to help him learn his lines. When a theater festival in Hiroshima assigns a young driver named Misaki to take the wheel of his red Saab, the car becomes the only place in his life where something like honesty might eventually become possible.\n\nDrive My Car is structured with a patience that demands surrender. Ryusuke Hamaguchi and co-writer Takamasa Oe, working from short stories by Haruki Murakami, open the film with an extended prologue — nearly forty minutes before the title card appears — that establishes the texture of Kafuku\'s marriage with such precision that everything that follows is already shadowed by it. The effect is not slowness for its own sake but accumulation: by the time the film proper begins, viewers carry the same unfinished business the characters do. The three-hour runtime is earned scene by scene, each conversation adding weight to the ones that came before.\n\nAt the center of the film is a theatrical production that earns its place in the story rather than merely decorating it. Kafuku is directing Uncle Vanya with an international cast performing in their own languages — Japanese, Korean, Mandarin, Korean Sign Language — each speaking words that the others can follow only by context and repetition. Chekhov\'s play, about people who have spent their lives failing to live, maps precisely onto the characters surrounding it without the film ever forcing the connection. The multilingual structure is also one of the film\'s most quietly radical ideas: that meaning travels across languages because feeling does, and that genuine listening is an act distinct from comprehension.\n\nHidetoshi Nishijima carries the film with a stillness so complete it becomes its own kind of expressiveness. Kafuku is a man whose grief has gone structural — reorganized itself into control, routine, the performance of composure — and Nishijima makes visible the cost of that reorganization without ever reaching for sympathy. Toko Miura, as Misaki, works in an almost entirely interior register. The character says little for long stretches, and what she withholds matters as much as what she eventually gives. The intimacy that grows between them is not romantic; it is the particular closeness of two people who have decided, almost without deciding, to stop protecting themselves.\n\nEiko Ishibashi\'s score arrives rarely and with care, leaving long silences that the film trusts completely. Hidetoshi Shinomiya\'s cinematography handles the car\'s interior — which should be a cinematographic problem — as a space of genuine stillness, the camera watching the two figures with a neutrality that refuses to guide the audience toward any single response.\n\nThe film asks for something from its viewers that most films no longer bother to request: the willingness to sit with unresolved feeling, to follow a story that builds its meaning laterally rather than vertically. What Drive My Car earns, in its final passages, is not catharsis in the conventional sense but something harder to name — a settling, perhaps, or the recognition of what it costs and what it means to keep going. That it achieves this across five languages, inside a borrowed car, through the long careful work of two people learning to speak to each other, is not a small thing. It is exactly the kind of thing cinema exists to do."

          fullReview: "Pennsylvania, 1956. Frank Sheeran is a truck driver who takes a wrong turn and ends up in the orbit of Russell Bufalino, a quiet, well-dressed man from northeastern Pennsylvania who sees something useful in this capable, unquestioning Irishman. What follows is fifty years of dinners, favors, and shootings — narrated from a wheelchair in a care facility at the end of the century, addressed to no one in particular, received by no one who matters. The confession arrives too late for absolution and too early for death to make it moot. That gap is where The Irishman lives.\n\nMartin Scorsese has made mob films before, but this is not that kind of mob film. Goodfellas moved at the speed of cocaine and ambition; The Irishman moves at the speed of old age. At three and a half hours, it has the weight of biography rather than thriller, and the patience to let silences accumulate the way regrets do — slowly, without announcement, until one day the room is full of them. Steven Zaillian\'s screenplay, adapted from Charles Brandt\'s nonfiction book, is a model of compression across enormous historical sweep. Decades pass in the time it takes to notice someone\'s posture has changed.\n\nRobert De Niro gives what may be the most interior performance of his career. Frank Sheeran is not a man who explains himself, because the kind of man he is requires no explanation — violence and loyalty are simply the terms by which he organizes the world. What De Niro captures, without ever editorializing, is the progressive narrowing of that world: the way the relationships that gave life its structure gradually disappear, until all that remains is the structure itself, hollow and standing. The digital de-aging technology that enables this performance across decades is occasionally distracting — certain sequences in the 1950s have a quality of unreality that never quite resolves — but it is a minor friction in a film that earns its ambitions.\n\nAl Pacino, playing Jimmy Hoffa, operates in a different register entirely. Where De Niro withholds, Pacino performs — and the performance is the point, because Hoffa is a man who has spent his life playing a character, a force of populist thunder constructed and maintained with tremendous effort. The scenes between the two of them have a peculiar intimacy: one man who expresses everything he cannot feel, another who feels everything he cannot express. Joe Pesci, returning from a decade of semi-retirement, plays Russell Bufalino as a kind of patriarch of stillness — a man whose power resides precisely in never raising his voice, and whose gravitational pull on the narrative is all the more unsettling for being so understated.\n\nThe film\'s deepest preoccupation is with Anna Paquin\'s Peggy, Frank\'s daughter, who appears in the film almost entirely without dialogue. She watches. She watches her father with a knowledge she cannot articulate and a judgment she refuses to soften. The film does not explain her silence — it simply shows it, scene after scene, and trusts that the viewer will understand. There is more moral weight in those silent looks than in a hundred pages of spoken recrimination.\n\nRodrigo Prieto\'s cinematography is measured and purposeful, returning repeatedly to the image of men watching other men across rooms, reading intentions in stillness. Thelma Schoonmaker\'s editing — at three and a half hours, a genuine structural achievement — gives the film the rhythm of memoir: the way certain images recur, the way certain silences stretch, the way time is both compressed and expanded depending on what the scene needs to carry.\n\nThe Irishman is a film about what disappears. The unions. The mob. The political moment that produced both. The people who knew what really happened and why. By its extraordinary final passage — Frank alone in a room he cannot leave, a door left slightly ajar at his request — Scorsese has made a film less about organized crime than about the specific American loneliness of a man who spent his life in service to structures that evaporated and took everyone with them. What remains is not guilt exactly. It is something closer to an absence where guilt should be, and that absence is somehow worse."

          mood: ["elegiac", "smoldering", "suffocating"],
          fullReview: "Cold War compresses fifteen years of an impossible love affair into eighty-eight minutes, and somehow that compression — the ruthless ellipsis of everything in between — feels not like deprivation but like a heightened form of truth. Paweł Pawlikowski sets his film in the ruins and reconstruction of post-war Poland, where a state-funded folk music ensemble becomes the unlikely cradle for one of the most devastating screen romances in recent memory. Wiktor is the ensemble\'s quietly impassioned music director; Zula is the young woman with a criminal past who walks into auditions and immediately electrifies the room. They should not work as a couple. They do, and then they don\'t, and then they do again, across Poland and Yugoslavia and East Berlin and Paris, decade after decade, the same gravitational pull and the same catastrophic incompatibility.\n\nThe film was inspired by Pawlikowski\'s own parents, and it shows — not in sentimentality, but in the way it refuses to assign simple blame or simple devotion to anyone. Zula, played by Joanna Kulig, is the kind of character who gets described as difficult and mercurial when what those words really mean is fully alive. She is funny, dangerous, loyal to herself above everyone else, capable of tremendous cruelty and tremendous warmth within the same scene. Kulig gives her a physical intelligence that goes beyond technique — every movement, every pause, carries the accumulated history of a woman who has learned that self-preservation requires constant performance. Tomasz Kot, as Wiktor, is the film\'s quieter and more porous center: a man who loves deeply and with less armor, who keeps offering himself to something that keeps returning him bruised. The contrast between them is the engine the whole film runs on.\n\nŁukasz Żal\'s cinematography in the Academy ratio — crisp, high-contrast black and white in boxy 4:3 — is not mere aesthetic affectation. The format does what the story requires: it encloses. Every frame feels like a world with walls. The architecture of Stalinist Poland, the smoky jazz clubs of Paris, the stone churches where the couple circles back to each other — they all carry the same quality of enclosure that the film itself wears as a formal argument. The audience never forgets that these people are trapped, even in the moments when they believe they have escaped.\n\nPawlikowski\'s editing strategy is equally radical. He cuts entire years without explanation — a character is somewhere, then they are somewhere else, older, in a different city with a different lover. This elliptical structure demands active engagement. The film trusts its audience to do emotional arithmetic: to feel the weight of what happened in the gaps without being shown any of it. Some viewers will find this approach cold, even withholding. That resistance is understandable, though it mistakes severity for indifference. Cold War is a film that gives exactly what it gives and asks the rest to be supplied by the person watching.\n\nThe music threading through the picture — Polish folk songs transposed into jazz riffs, Soviet-flavored anthems in service of ideology, Parisian torch songs, the first intoxicating shock of rock and roll — functions as both atmosphere and political argument. The moment when a traditional folk melody is bent and standardized into propaganda is genuinely dispiriting to witness. The moment when the same material is liberated into something looser and stranger is quietly euphoric. Music here is not decoration. It is the vocabulary through which these two people understand freedom, compromise, and each other.\n\nAt eighty-eight minutes, Cold War is a film without an ounce of excess. What remains is everything that was distilled out."
