          fullReview: "Some films take years to make. This one took five, survived a fire that destroyed its sets, cycled through actors who came and went, and arrived at Cannes in 2004 still technically unfinished — Wong Kar-Wai editing on a laptop through the night before the premiere screening. The turbulence is not entirely invisible in the finished film, which is the source of both its richness and its frustration. 2046 is a work of genuine ambition straining at seams that do not always hold.\n\nChow Mo-wan — last seen at the end of In the Mood for Love, hollowing out a secret into a stone wall at Angkor Wat — is now a writer in a Singapore hotel, living in room 2047 next to a room he keeps trying to rent. He drinks. He gambles. He writes pulp science fiction. Women move through his life in succession: a magnetic card shark he desires without being able to fully reach; the hotel owner\'s daughter, slowly and painfully in love with a Japanese man her family forbids; another woman who shares the name of someone he lost. Each encounter circles the same absence. Each one ends in a different variety of incompletion.\n\nThe science fiction sections — set aboard a futuristic train perpetually bound for a place called 2046 where nothing ever changes — are Wong\'s most explicit statement of his themes, rendered in cool blues and lacquered reds, with androids who respond to human affection on a delay. The delay is the metaphor: these are machines processing feeling at a frequency that cannot match the speed of the person wanting. The sequences are visually stunning and conceptually interesting but they sit slightly apart from the film\'s warmer, more urgent sections. They feel like illustrations of what the rest of the film enacts. When cinema is working at full power, it does not need to illustrate its own arguments.\n\nWhat saves 2046 from becoming a beautiful but airless exercise is Zhang Ziyi. Her Bai Ling — a nightclub hostess who falls for Chow in a direct, un-hedged way that he cannot match — is the film\'s moral center, almost despite the film\'s intentions. She wants something and says so. She is humiliated by the wanting and refuses to pretend otherwise. Zhang plays the role with a rawness that cuts through the film\'s formal elegance like a sharp edge through silk. The scene in which she names a price for her company — knowing it is a mistake, doing it anyway — is the most honest moment in a film otherwise devoted to evasion, and it lands accordingly.\n\nFaye Wong as the hotelier\'s daughter carries the film\'s other emotional spine. Her subplot, in which she waits for letters from a man in Tokyo who replies slowly and then not at all, distills something about love and waiting and the peculiar cruelty of time that the film reaches for elsewhere with less success. The pairing of her scenes with Takuya Kimura, who plays the Japanese suitor with a quality of tender unavailability, generates the kind of feeling that the Chow Mo-wan sections increasingly cannot, because Chow has become something the film treats as inevitable: a man so devoted to mourning that he has made a lifestyle of it.\n\nThis is where 2046 earns its honest critique. Tony Leung does precisely what is asked of him — the performance is controlled, internally complex, physically inhabited — but Wong has written Chow into a corner from which no exit is possible or sought. As protagonist, Chow is a black hole. The women around him are vivid; he reflects them back dimmed. The film knows this — it is arguably the subject — but knowingness does not solve the problem of spending two hours with a character who has decided, in advance, that nothing will change him.\n\nChristopher Doyle and Kwan Pung-Leung share cinematography, and their work is among the most physically gorgeous Wong has ever achieved. The 1960s Hong Kong corridors are amber and close; the Singapore nights are thick with neon and rain; the sci-fi train is sleek and cold. William Chang\'s editing moves through time in the distinctive Wong manner — non-sequentially, by emotional association — and the film\'s fragmented structure mirrors its subject without overwhelming it. Shigeru Umebayashi\'s waltz returns once more, and once more it works, because the music has earned its resonance across two prior films and simply has to sound to do its job.\n\nAt its best, 2046 is among the most beautiful films of its decade. At its worst, it mistakes accumulation for depth, circling without closing. What saves it from the latter verdict is that the accumulation is not random — each woman, each failed connection, each slow train adds to a portrait of a person who has built an entire architecture of behavior to avoid confronting a single fact about himself. The film is the architecture. Whether the portrait justifies the scale is a question that will depend on the viewer. Those who find Chow\'s particular brand of romantic paralysis fascinating will find this inexhaustible. Those who need their subjects to move will run short of patience somewhere in the second hour."

          mood: ["haunting", "tender", "bleak"],
          fullReview: "Blackeberg, a Stockholm suburb, winter 1982. The apartment blocks are identical, the snow is permanent, and a twelve-year-old boy named Oskar is being systematically tormented by three classmates who have identified him, correctly, as someone who will not fight back. He rehearses revenge alone in the courtyard at night, pressing a knife against a tree and hissing threats at no one. Then a girl moves in next door. She smells strange. She will not come inside until invited. She is cold to the touch. She tells him, the first time they meet, that they cannot be friends — and then keeps appearing anyway.\n\nTomas Alfredson does something with this material that almost no horror director since has managed to replicate: he treats the vampire as a condition rather than a monster. Eli is not frightening in the way horror films train their audiences to expect frightening. She is frightening the way a wounded animal is frightening — because her needs are genuine and her capacity for violence is not separable from her capacity for tenderness, and these coexist in her without contradiction. The film refuses to resolve this into either a redemption narrative or a cautionary one. Eli is what she is. The question the film asks is what Oskar will do with that knowledge, and whether love — if that is the right word for what develops between two isolated children in the dark — can survive being fully informed.\n\nJohn Ajvide Lindqvist adapted his own novel, and his screenplay preserves the book\'s most important structural choice: the horror elements are not separate from the character study. They are the same thing. Håkan, the middle-aged man who lives with Eli and commits murders on her behalf, is the film\'s most disturbing figure precisely because the film declines to simplify him. What he does is monstrous. Why he does it is rendered with a terrible and quiet clarity. His presence in the story is the film\'s darkest argument — that the relationship forming between Oskar and Eli may follow a pattern, that protectors are made as well as born, and that by the time a person understands what they have become, the becoming is complete. Alfredson does not underline this. He simply lets it sit in the room.\n\nKåre Hedebrant plays Oskar with a quality of stillness that actors twice his age spend careers trying to achieve. The character\'s interiority — his fantasy life, his rage, his sudden capacity for gentleness — is entirely legible without being performed. When Oskar learns what Eli is, his response is not terror but a kind of solemnity, as if some part of him already knew that the world accommodating him and the world accommodating her were the same world. It is a remarkable piece of work from a first-time actor in a film built around his reactions.\n\nLina Leandersson\'s voice was dubbed in post-production by another actress, a decision that initially seems strange until it becomes clear what it accomplishes: Eli\'s voice carries an age that her face does not, a quality of patience that no twelve-year-old could naturally produce. The dissociation is eerie in exactly the right register. Her physical performance — the way she holds herself slightly apart from the world, the way she climbs and crouches and moves through space with the economy of something that does not concern itself with human norms — does the rest.\n\nHoyte van Hoytema\'s cinematography is the film\'s third central performance. He shoots the Swedish winter not as a picturesque backdrop but as an environment that actively drains color and warmth from everything it touches. The apartment interiors are amber and cramped; the outdoor scenes are grey-white, the horizon flat, the light arriving from no particular direction. When blood appears against snow, the contrast is not stylized — it lands like an accident, which is exactly the right effect. Johan Söderqvist\'s score is sparse and string-based, offering texture rather than emotional instruction, which is the only approach this film could tolerate.\n\nThe final scene — set in a train, told entirely through the sound of Morse code tapped against a box — is one of the great endings in recent cinema. It does not deliver catharsis. It delivers information, and leaves the processing entirely to the audience. What has been saved, what has been lost, what pattern is repeating — these are not questions the film answers. They are questions it has been building, without announcement, from its first frame.\n\nLet the Right One In is a film about loneliness so severe that it makes monsters of children and monsters into companions. It works as horror, as coming-of-age story, as portrait of a particular kind of loveless suburb, and as a meditation on what people are willing to overlook in exchange for not being alone. That it works as all of these simultaneously, without any single register overwhelming the others, is the measure of how precisely Alfredson has calibrated every element. There is not a scene here that earns less than exactly what it costs."

          fullReview: "Melancholia splits itself cleanly in two. The first half tracks Justine (Kirsten Dunst) through the slow collapse of her own wedding reception at a palatial estate — a night that should represent a beginning but functions more like a controlled demolition. The second half belongs to her sister Claire (Charlotte Gainsbourg), as a rogue planet named Melancholia drifts through space on a path that may or may not end with Earth. Lars von Trier, who conceived the film during a period of severe clinical depression, is not interested in making a disaster movie. He is interested in something harder to name: what the end of the world looks like to someone who has already lived through their own private version of it, repeatedly, for years.\n\nThe film opens with one of the most extraordinary preambles in recent cinema — a series of slow-motion tableaux vivants set against the prelude to Richard Wagner\'s Tristan und Isolde, showing the conclusion of the film before a word of dialogue has been spoken. Birds fall from a tree. A bride sinks into grass black as a gown. A planet swallows another. The audience watches the world end before the story starts, and then watches the story anyway. That choice is not a spoiler; it is the thesis. What von Trier is examining is not whether the planet hits, but how different people inhabit the knowledge that it will.\n\nDunst\'s performance in the first half is among the most honest portrayals of depression committed to film. Justine does not behave as someone diagnosably unwell might in a lesser film — with weeping or proclamations or dramatic breakdowns. She is simply absent. Present in body, gone everywhere that matters. The way Dunst lets smiles form on her face that do not reach the muscles behind them, the way she disappears from her own wedding in increments, leaving behind only her outline — it is a performance built from negative space. It won her the Best Actress prize at Cannes, and the prize was right.\n\nThe second half is where the film earns its permanence. Charlotte Gainsbourg as Claire — practical, competent, loving in the careful way of someone who has organized their life precisely against disorder — begins to fracture as the planet draws closer. Justine, by contrast, finds something approaching peace. Von Trier\'s argument here is bleak and uncomfortably persuasive: that depression, which strips away the illusion that things can be fixed, constitutes a form of preparation for the absolute. The person who has never stopped expecting catastrophe is, in the end, the calmest in the room.\n\nKiefer Sutherland\'s husband John is drawn with unusual restraint — a man whose faith in scientific probability tips, almost imperceptibly, into a form of denial that is more poignant than arrogant. His quietly off-screen arc lands harder than many louder films manage. Udo Kier as a wedding planner having a very bad evening provides the film\'s few moments of dry comedy, and they land cleanly because the film has done the tonal work to earn them. Cameron Spurr as Claire\'s young son Leo anchors the final passage in something recognizably human — keeping what might have been pure philosophical abstraction connected to the ground.\n\nManuel Alberto Claro\'s cinematography shifts between modes with purpose: the handheld, documentary roughness of the wedding sequence and the immaculate stillness of everything involving the approaching planet. That contrast maps the film\'s argument visually — the noise of human social obligation against the indifferent clarity of astronomical time.\n\nThe first half will lose viewers. It is designed, in part, to do so. Sitting through Justine\'s wedding is an exercise in prolonged discomfort that deliberately replicates what depression does to social time: everything lasts too long, goodwill curdles into dread, the gap between performance and feeling widens until pretense becomes impossible. Anyone who needs a film to move in conventional narrative rhythms will disengage long before the planet clarifies its intentions.\n\nVon Trier does not offer consolation. The film ends precisely the way it announces it will end, and its final image is at once devastating and strangely serene — a piece of cinema that a person carries out of the room and finds sitting on their chest hours later. Whether Melancholia reads as nihilistic or as the most honest film ever made about the specific calm that comes from accepting the unacceptable depends entirely on what the viewer brings into it. That the film holds that ambiguity, at that length, at that emotional pitch, without faltering, is what makes it genuinely exceptional."
        }

        review: {
          themes: ["memory", "displacement", "consciousness", "archaeology", "perception", "belonging", "time"],
          mood: ["meditative", "disquieting", "dreamlike"],
          fullReview: "Memoria opens in darkness and a sound. Not music — something else. A low, cavernous thud that seems to emerge from the bottom of a very deep lake, or possibly from inside the skull of the woman who wakes to it. Jessica Holland (Tilda Swinton) is a Scottish orchid grower living in Medellín, visiting Bogotá to check on her hospitalized sister Karen. She heard the bang. No one else in the building did. And what follows, across the next two hours and sixteen minutes, is about what it means to be haunted by a sound that may not belong to the physical world.\n\nApichatpong Weerasethakul\'s first film made outside his native Thailand is a work of extraordinary atmospheric discipline. Shot in the Colombian highlands and jungle by Sayombhu Mukdeeprom, the film unfolds in a register so deliberate that entire minutes pass with nothing happening in any conventional narrative sense — a car horn, an insect, the ambient hum of a hospital corridor, a man sleeping in a market. The camera rarely moves. Scenes play in single takes of unusual length. The film lives inside perception, in the gap between what the body registers and what the mind can contain.\n\nSwinton anchors the film not through performance in any traditional sense but through presence. Jessica is curious, dislocated, and fundamentally open — a woman existing slightly apart from every space she enters, watching and listening where others would speak. Swinton allows enormous amounts of the film to pass across her face without resolving into legible emotion. This is difficult work precisely because it asks an actor to hold attention while demonstrating the absence of certainty. She is not playing a feeling; she is playing the act of receiving.\n\nThe film is careful about what it does with Colombia as a location. Weerasethakul is an outsider here, and Memoria does not pretend otherwise. Jessica moves through Bogotá as a genuine foreigner — a translator mediates several of her conversations, and the city offers her no particular comfort or orientation. When the film eventually descends into the jungle, it does so without the mysticism that typically attaches to a European or North American eye encountering tropical wilderness. The landscape feels archaeological rather than exotic, and that shift in register is deliberate. Excavation — literal and otherwise — runs through the film\'s entire nervous system.\n\nSound is not incidental here; it is the subject. The collaboration between sound designers Akritchalerm Kalayanamitr and Richard Hocks produces one of the most precisely engineered sonic environments in recent cinema. Silences have physical weight. The bang itself, which recurs unpredictably throughout, bypasses conventional jump-scare mechanics entirely — it does not startle so much as unsettle, landing somewhere between a physical intrusion and a metaphysical argument. Viewers who find it irritating may be the wrong audience. Viewers who find themselves quietly bracing before it arrives again are being asked exactly the right question.\n\nThe film\'s extended sequence in a recording studio — where a young sound engineer named Hernán (Juan Pablo Urrego) helps Jessica recreate her mystery noise through synthesis software — is quietly one of the finest scenes in any film of its year. Jessica listens to different sonic constructions, accepting or rejecting each with small, precise nods. The sequence works as a thesis: that experience precedes understanding, that knowing what something sounds like is a different act from knowing what it means. The film offers no correction to this uncertainty.\n\nWho this film is for requires honesty: Memoria will frustrate, bore, and mystify anyone who needs cinema to resolve what it raises. The walkouts at its Cannes premiere were not a failure of the film. They were a mismatch of expectations. This is slow cinema in the specific and demanding tradition — not slow as in gentle, but slow as in unflinching about the pace at which genuine perception operates. The film asks for a mode of attention that most cinema trains audiences away from.\n\nFor those who meet it on its own terms, what accumulates is difficult to describe and resistant to spoiling. The film\'s final passage — set in the jungle, involving Elkin Díaz in a role whose significance the film reveals by degrees — achieves something genuinely rare: a cinematic experience that does not conclude so much as open. The questions Memoria holds at its center — whether consciousness can outlast the body that carries it, whether landscape retains what has passed through it — are not answered. They are rendered as sensation. That sustained ambiguity, held without anxiety for the entirety of its runtime, is what makes this film the kind of thing cinema is uniquely positioned to do. It stays with anyone willing to be still enough to receive it."

          { body: "Chicago Film Critics Association Awards (2001)", category: "Best Film", result: "Won", year: 2001 },
          { body: "Chicago Film Critics Association Awards (2001)", category: "Best Director", result: "Won", year: 2001 },
          { body: "Chicago Film Critics Association Awards (2001)", category: "Best Actress", result: "Won", year: 2001 },
          { body: "Los Angeles Film Critics Association (2001)", category: "Best Director", result: "Won", year: 2001 },
          { body: "New York Film Critics Circle (2001)", category: "Best Film", result: "Won", year: 2001 },
          { body: "National Society of Film Critics (2002)", category: "Best Film", result: "Won", year: 2002 },
          { body: "National Society of Film Critics (2002)", category: "Best Actress", result: "Won", year: 2002 },
          { body: "Film Independent Spirit Awards (17th)", category: "Best Cinematography", result: "Won", year: 2002 },
          { body: "Cannes Film Festival (54th)", category: "Palme d\'Or", result: "Nominated", year: 2001 },
          { body: "Academy Awards (74th)", category: "Best Director", result: "Nominated", year: 2002 },
          { body: "BAFTA Film Awards (55th)", category: "Best Original Music", result: "Nominated", year: 2002 }
        ],
        criticRating: "Masterpiece",
        review: {
          themes: ["identity", "desire", "ambition", "performance", "duality", "obsession", "guilt", "delusion"],
          mood: ["disorienting", "seductive", "sinister"],
          fullReview: "There is a scene early in Mulholland Drive — perhaps twenty minutes in — where a man describes a nightmare to another man at a diner, and then the nightmare happens. The scene has almost nothing to do with the main narrative. It exists because Lynch needs the audience to know what kind of film they are in: one where dread is structural, where what lives just outside the frame is exactly as terrifying as a person imagines it to be, where the act of fearing something can summon it into being.\n\nBetty Elms (Naomi Watts) arrives in Los Angeles with a suitcase, a smile that appears to run on nuclear optimism, and a dream of becoming a movie star. She finds a dark-haired woman (Laura Harring) hiding in her apartment — a woman who has survived a car accident on Mulholland Drive and has no idea who she is. Meanwhile, a film director named Adam Kesher (Justin Theroux) is losing control of his own production to a pair of men in suits who represent something not quite explicable in ordinary professional terms. These three threads orbit each other for well over two hours before the film folds back on itself and asks whether any of what came before was real.\n\nLynch had already made Blue Velvet and Twin Peaks before this. Mulholland Drive is where those instincts — the idyllic surface, the rotting underneath — reach full maturity. The film thinks about Hollywood the way a toxicologist thinks about a beautiful poison: with intense precision and genuine appreciation for the elegance of how it works. It is not a satire, not a polemic. It is a fever dream that happens to take place in the city where other people\'s fever dreams go to be manufactured and sold.\n\nNaomi Watts had worked for a decade before this film. Here she gives two performances in one — an eager ingénue whose every smile seems held up by sheer force of will, and then, once the film shifts registers, something else entirely. To describe it more specifically would be to spoil a structural revelation that lands like a physical sensation. What can be said is that the transition from one mode to the other is seamless and shattering, and that Watts does not cheat on either side. Laura Harring\'s Rita is more opaque by design — she spends most of the film without a past, which turns out to be a different kind of performance — and she holds the mystery with real authority.\n\nAngelo Badalamenti\'s score is effectively a third lead. It wraps every scene in something plush and slightly wrong, strings that feel like they are searching for a resolution they will never reach. Lynch composed the overall sound of this film the way a perfumer blends: nothing is accidental, and the result is physically immersive in ways that descriptions fail. The Club Silencio sequence — a theater scene that may be the film\'s true gravitational center — is one of cinema\'s great sustained passages, and its power is almost entirely sonic before it becomes visual.\n\nPeter Deming\'s cinematography bathes Hollywood in a blue-black darkness that makes even the sunny exteriors feel borrowed, like a stage set with a horizon painted on the back wall. Jack Fisk\'s production design understands that every location in this film is simultaneously a place and a state of mind. The apartment where Betty arrives could only exist in a dream of what Los Angeles ought to be.\n\nThe narrative structure is the film\'s most polarizing quality and also its most honest. Mulholland Drive does not tell a linear story. It tells two stories that overlap and contradict each other, and the relationship between them is not explained, only implied through image, sound, and emotional logic. Applying conventional narrative expectations to this film is a category error, like demanding that a piece of music follow the rules of architecture. Lynch is working with the grammar of dreaming: the spatial distortions, the impossible repetitions, the way desire and guilt rewrite the people around a person into figures that can be better managed.\n\nWho the film is not for: anyone who needs cinema to answer what it raises, who measures a film\'s success by how fully it resolves. For that viewer, Mulholland Drive will feel like a con. For everyone else — and especially for those willing to sit with what it generates rather than immediately explain it away — the film leaves residue that persists for years. Images resurface. The cowboy appears a second time. The blue box opens.\n\nMulholland Drive earned Best Director at Cannes in 2001, Best Film from the New York Film Critics Circle, and a Best Director nomination at the Academy Awards. In critics\' polls over the two decades since, it has repeatedly been named the best film of the 21st century. Those facts are a frame, not an explanation. The experience of sitting with it the first time is singular enough to render the consensus beside the point."
        }

    /* ═══════════════════════════════════════════════════════════
       CONSTANTS
       ═══════════════════════════════════════════════════════════ */
    const RATING_WEIGHTS = {
      'Masterpiece': 10, 'Exceptional': 9, 'Great': 8, 'Solid': 7, 'Decent': 6,
      'Mediocre': 5, 'Flawed': 4, 'Poor': 3, 'Awful': 2, 'Abysmal': 1
    };

    const RATING_COLORS = {
      'Masterpiece': { text: '#D4AF37', bg: 'rgba(212,175,55,0.12)', border: '#D4AF37' },
      'Exceptional': { text: '#4ADE80', bg: 'rgba(74,222,128,0.10)', border: '#4ADE80' },

      'Solid': { text: '#059669', bg: 'rgba(5,150,105,0.10)', border: '#059669' },
      'Decent': { text: '#38BDF8', bg: 'rgba(56,189,248,0.10)', border: '#38BDF8' },
      'Mediocre': { text: '#94A3B8', bg: 'rgba(148,163,184,0.10)', border: '#94A3B8' },
      'Flawed': { text: '#F97316', bg: 'rgba(249,115,22,0.10)', border: '#F97316' },

      'Exceptional': '#4ADE80',
      'Great': '#22C55E',
      'Solid': '#059669',
      'Decent': '#38BDF8',
      'Mediocre': '#94A3B8',
      'Flawed': '#F97316',
      'Poor': '#EF4444',
      'Awful': '#DC2626',
      'Abysmal': '#991B1B'
    };

    /* ═══════════════════════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════════════════════ */
    let state = {
      search: '',
      sort: 'rating-desc',
      filterPanelOpen: false,
      filters: {
        decades: new Set(),
        yearMin: null,
        yearMax: null,
        genres: new Set(),
        viewerRatings: new Set(),
        criticRatings: new Set(),
        awardWinning: false,
        themes: new Set(),
        moods: new Set(),
        languages: new Set()
      }
    };

    /* ═══════════════════════════════════════════════════════════
       UTILITIES
       ═══════════════════════════════════════════════════════════ */
    function normalize(str) {
      return String(str ?? '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function stripArticle(title) {
      return String(title ?? '').replace(/^(the |a |an )/i, '');
    }

    function formatDuration(dur) {
      if (!dur) return '';
      const [h, m] = dur.split(':');
      const hours = parseInt(h, 10);
      const mins = parseInt(m, 10);
      if (hours === 0) return `${mins}m`;
      return mins === 0 ? `${hours}h` : `${hours}h ${mins}m`;
    }

    function initial(name) {
      return String(name ?? '?').trim().charAt(0).toUpperCase();
    }

    function isSafeUrl(url) {
      return typeof url === 'string' && url.startsWith('https://');
    }

    /* ═══════════════════════════════════════════════════════════
       COLLECTION META (auto-derived from MOVIES)
       ═══════════════════════════════════════════════════════════ */
    function getCollectionMeta() {
      if (MOVIES.length === 0) {
        return { decades: [], yearMin: 1900, yearMax: new Date().getFullYear(), genres: [], themes: [], moods: [], languages: [] };
      }
      const years = MOVIES.map(m => m.year).filter(Boolean);
      const yearMin = Math.min(...years);
      const yearMax = Math.max(...years);
      const decades = [...new Set(years.map(y => Math.floor(y / 10) * 10))].sort((a, b) => a - b);
      const genres = [...new Set(MOVIES.flatMap(m => m.genres || []))].sort();
      const themes = [...new Set(MOVIES.flatMap(m => m.review?.themes || []))].sort();
      const moods = [...new Set(MOVIES.flatMap(m => m.review?.mood || []))].sort();
      const languages = [...new Set(MOVIES.flatMap(m => m.languages || []))].sort();
      return { decades, yearMin, yearMax, genres, themes, moods, languages };
    }

    /* ═══════════════════════════════════════════════════════════
       FILTER / SEARCH / SORT PIPELINE
       ═══════════════════════════════════════════════════════════ */
    function getFilteredMovies() {
      let films = [...MOVIES];
      const f = state.filters;

      // ── Search ──
      if (state.search) {
        const q = normalize(state.search);
        films = films.filter(m => {
          const fields = [
            m.title, m.originalTitle, m.romanization, m.tagline,
            ...(m.director || []).map(d => d.name),
            ...(m.screenplay || []).map(s => s.name),
            ...(m.cast || []).flatMap(c => [c.actor, c.role]),
            String(m.year),
            ...(m.genres || []),
            ...(m.awards || []).flatMap(a => [a.body, a.category]),
            ...(m.review?.themes || []),
            m.review?.mood,
            m.review?.standoutWork,
            ...(m.review?.comparisons || [])
          ].filter(Boolean);
          return fields.some(fld => normalize(fld).includes(q));
        });
      }

      // ── Decade ──
      if (f.decades.size > 0) {
        films = films.filter(m => f.decades.has(Math.floor(m.year / 10) * 10));
      }

      // ── Year range ──
      if (f.yearMin !== null) films = films.filter(m => m.year >= f.yearMin);
      if (f.yearMax !== null) films = films.filter(m => m.year <= f.yearMax);

      // ── Genre ──
      if (f.genres.size > 0) {
        films = films.filter(m => {
          const filmGenres = m.genres || [];
          return [...f.genres].every(g => filmGenres.includes(g));
        });
      }

      // ── Viewer rating ──
      if (f.viewerRatings.size > 0) {
        films = films.filter(m => f.viewerRatings.has(m.viewerRating?.rating));
      }

      // ── Critic rating ──
      if (f.criticRatings.size > 0) {
        films = films.filter(m => f.criticRatings.has(m.criticRating));
      }

      // ── Award-winning ──
      if (f.awardWinning) {
        films = films.filter(m => (m.awards || []).some(a => a.result === 'Won'));
      }

      // ── Theme ──
      if (f.themes.size > 0) {
        films = films.filter(m => {
          const filmThemes = m.review?.themes || [];
          return [...f.themes].every(t => filmThemes.includes(t));
        });
      }

      // ── Mood ──
      if (f.moods.size > 0) {
        films = films.filter(m => {
          const filmMoods = [].concat(m.review?.mood || []);
          return [...f.moods].every(md => filmMoods.includes(md));
        });
      }

      // ── Language ──
      if (f.languages.size > 0) {
        films = films.filter(m => {
          const filmLangs = m.languages || [];
          return [...f.languages].every(l => filmLangs.includes(l));
        });
      }

      // ── Sort ──
      films.sort((a, b) => {
        switch (state.sort) {
          case 'alpha-asc': return stripArticle(a.title).localeCompare(stripArticle(b.title));
          case 'alpha-desc': return stripArticle(b.title).localeCompare(stripArticle(a.title));
          case 'year-asc': return (a.year || 0) - (b.year || 0);
          case 'year-desc': return (b.year || 0) - (a.year || 0);
          case 'rating-asc': return (RATING_WEIGHTS[a.criticRating] || 0) - (RATING_WEIGHTS[b.criticRating] || 0);
          case 'rating-desc': return (RATING_WEIGHTS[b.criticRating] || 0) - (RATING_WEIGHTS[a.criticRating] || 0);
          default: return 0;
        }
      });

      return films;
    }

    function getActiveFilterCount() {
      const f = state.filters;
      let n = 0;
      if (f.decades.size > 0) n++;
      if (f.yearMin !== null || f.yearMax !== null) n++;
      if (f.genres.size > 0) n++;
      if (f.viewerRatings.size > 0) n++;
      if (f.criticRatings.size > 0) n++;
      if (f.awardWinning) n++;
      if (f.themes.size > 0) n++;
      if (f.moods.size > 0) n++;
      if (f.languages.size > 0) n++;
      return n;
    }

    /* ═══════════════════════════════════════════════════════════
       GRID RENDERING
       ═══════════════════════════════════════════════════════════ */
    function renderGrid() {
      const films = getFilteredMovies();
      const grid = document.getElementById('film-grid');
      const footerCount = document.getElementById('footer-count');
      const activeCount = getActiveFilterCount();

      const clearBtn = document.getElementById('clear-filters-btn');
      if (clearBtn) {
        clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      }

      const total = MOVIES.length;
      footerCount.textContent = total === 0
        ? 'The vault is empty'
        : `Showing ${films.length} of ${total} film${total !== 1 ? 's' : ''}`;

      // Update film count in header
      document.getElementById('film-count').textContent = total;
      document.getElementById('film-count-plural').textContent = total === 1 ? '' : 's';

      grid.innerHTML = '';

      if (films.length === 0) {
        renderEmptyState(grid);
        return;
      }

      const q = state.search ? normalize(state.search) : '';
      films.forEach(film => grid.appendChild(buildCard(film, q)));
    }

    function renderEmptyState(container) {
      const div = document.createElement('div');
      div.className = 'empty-state';
      if (MOVIES.length === 0) {
        div.innerHTML = `
          <div class="empty-state__symbol">⬛ ⬜ ⬛</div>
          <h2 class="empty-state__title">The vault awaits its first film.</h2>
          <p class="empty-state__sub">Add a title to begin the collection.</p>
        `;
      } else {
        div.innerHTML = `
          <div class="empty-state__symbol">◌</div>
          <h2 class="empty-state__title">No films match.</h2>
          <p class="empty-state__sub">Try narrowing your search or clearing a filter.</p>
        `;
      }
      container.appendChild(div);
    }

    function highlightMatch(text, q) {
      if (!q) return escHtml(text);
      const norm = normalize(text);
      const idx = norm.indexOf(q);
      if (idx === -1) return escHtml(text);
      return escHtml(text.slice(0, idx))
        + `<mark>${escHtml(text.slice(idx, idx + q.length))}</mark>`
        + escHtml(text.slice(idx + q.length));
    }

    function buildCard(film, q) {
      const card = document.createElement('article');
      card.className = 'film-card';
      card.setAttribute('role', 'listitem');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${film.title} (${film.year}), ${film.criticRating}`);

      const badgeColor = BADGE_COLORS[film.criticRating] || '#8a8680';
      const weight = RATING_WEIGHTS[film.criticRating];
      const ratingDisp = weight ? `${film.criticRating} ✦ ${weight}/10` : film.criticRating;

      let posterHtml;
      if (isSafeUrl(film.posterUrl)) {
        const fid = `pf-${film.id}`;
        posterHtml = `
          <img class="film-card__poster" src="${escHtml(film.posterUrl)}"
               alt="${escHtml(film.title)} poster" loading="lazy"
               onerror="this.style.display='none';document.getElementById('${fid}').style.display='flex'">
          <div class="film-card__fallback" id="${fid}" style="display:none">${escHtml(initial(film.title))}</div>
        `;
      } else {
        posterHtml = `<div class="film-card__fallback">${escHtml(initial(film.title))}</div>`;
      }

      const titleHtml = q ? highlightMatch(film.title, q) : escHtml(film.title);

      card.innerHTML = `
        ${posterHtml}
        <div class="film-card__overlay" aria-hidden="true">
          <div class="film-card__badge" style="--badge-color:${escHtml(badgeColor)}">${escHtml(ratingDisp || '')}</div>
          <div class="film-card__info">
            <h3 class="film-card__title">${titleHtml}</h3>
            <span class="film-card__year">${escHtml(String(film.year || ''))}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => openModal(film.id));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(film.id); }
      });

      return card;
    }

    /* ═══════════════════════════════════════════════════════════
       FILTER PANEL
       ═══════════════════════════════════════════════════════════ */
    function renderControls() {
      const meta = getCollectionMeta();
      const controls = document.getElementById('filter-controls');
      const f = state.filters;

      const curMin = f.yearMin !== null ? f.yearMin : meta.yearMin;
      const curMax = f.yearMax !== null ? f.yearMax : meta.yearMax;

      const VIEWER_RATINGS = ['U', 'PG', 'T-13', 'M-16', 'R-18', 'X'];
      const CRITIC_RATINGS = ['Masterpiece', 'Exceptional', 'Great', 'Solid', 'Decent', 'Mediocre', 'Flawed', 'Poor', 'Awful', 'Abysmal'];

      const sortOptions = [
        { id: 'alpha-asc', label: 'A–Z' },
        { id: 'alpha-desc', label: 'Z–A' },
        { id: 'year-asc', label: 'Year ↑' },
        { id: 'year-desc', label: 'Year ↓' },

        { id: 'rating-desc', label: 'Rating ↓' }
      ];

      const buildDropdown = (id, label, contentHtml, rightAlign = false) => `
        <div class="dropdown ${rightAlign ? 'dropdown--right' : ''}" id="dd-${id}">

        </div>

              <input type="range" class="range-slider" id="yr-min-sl" min="${meta.yearMin}" max="${meta.yearMax}" value="${curMin}">

      }

      // Viewer Rating
      const VIEWER_COLORS = { 'U': '#10B981', 'PG': '#3B82F6', 'T-13': '#F59E0B', 'M-16': '#F97316', 'R-18': '#EF4444', 'X': '#991B1B' };
      const vrHtml = `
        <div class="filter-checks filter-checks--grid">
          ${VIEWER_RATINGS.map(r => `

            </label>`).join('')}
        </div>`;
      html += buildDropdown('viewer', 'Viewer Rating', vrHtml);

      // Critic Rating
      const crHtml = `
        <div class="filter-checks filter-checks--2col">
          ${CRITIC_RATINGS.map(r => {
        const w = RATING_WEIGHTS[r];
        const dispRating = w ? `<span class="critic-score-badge">✦ ${w}/10</span>` : '';
        const color = (RATING_COLORS[r] || {}).text || 'inherit';
        return `
              <label class="filter-row-toggle">
                <input type="checkbox" value="${r}" ${f.criticRatings.has(r) ? 'checked' : ''} data-filter="criticRating" class="sr-only">

        </div>`;
      html += buildDropdown('critic', 'Critic Rating', crHtml);

      // Awards
      const awHtml = `
        <label class="toggle-switch-wrap">

      // Genre
      if (meta.genres.length > 0) {

      }

      // Mood
      if (meta.moods.length > 0) {
        const mdHtml = `
          <div class="tag-cloud">
            ${meta.moods.map(m => `
              <button class="tag-pill ${f.moods.has(m) ? 'is-active' : ''}" data-filter="mood" data-value="${escHtml(m)}">${escHtml(m)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('mood', 'Mood', mdHtml, true);
      }

      // Language
      if (meta.languages.length > 0) {
        const lgHtml = `
          <div class="tag-cloud">
            ${meta.languages.map(l => `
              <button class="tag-pill ${f.languages.has(l) ? 'is-active' : ''}" data-filter="language" data-value="${escHtml(l)}">${escHtml(l)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('language', 'Language', lgHtml, true);
      }

      // Clear button
      html += `<button class="clear-btn" id="clear-filters-btn" aria-label="Clear all filters">✕ Clear</button>`;

      controls.innerHTML = html;

      // --- Attach Events ---

      // Dropdown Toggles
      document.querySelectorAll('.dropdown').forEach(dropdown => {
        const btn = dropdown.querySelector('.dropdown-btn');
        const menu = dropdown.querySelector('.dropdown-menu');

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpen = menu.classList.contains('is-open');

          // Close all others
          document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('is-open'));
          document.querySelectorAll('.dropdown-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));

          if (!isOpen) {
            menu.classList.add('is-open');
            btn.setAttribute('aria-expanded', 'true');
          }
        });

        // Prevent closing when clicking inside the menu
        menu.addEventListener('click', e => e.stopPropagation());
      });

      // Close dropdowns on outside click
      document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('is-open'));
        document.querySelectorAll('.dropdown-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));
      });

      // Clear Filters
      const clearBtn = controls.querySelector('#clear-filters-btn');
      const activeCount = getActiveFilterCount();
      clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      clearBtn.addEventListener('click', () => {
        state.filters = {
          decades: new Set(), yearMin: null, yearMax: null,
          genres: new Set(), viewerRatings: new Set(), criticRatings: new Set(),
          awardWinning: false, themes: new Set(), moods: new Set(), languages: new Set()
        };
        renderControls();
        updateAndSave();
      });

      // Sort Input
      controls.querySelectorAll('input[name="sort"]').forEach(rb => {
        rb.addEventListener('change', () => {
          state.sort = rb.value;
          updateAndSave();
        });
      });

      // Checkbox Inputs
      const bindSetToggle = (selector, setKey, isInt = false) => {
        controls.querySelectorAll(selector).forEach(cb => {
          cb.addEventListener('change', () => {
            const v = isInt ? parseInt(cb.value, 10) : cb.value;
            cb.checked ? f[setKey].add(v) : f[setKey].delete(v);
            updateAndSave();
          });
        });
      };

      bindSetToggle('input[data-filter="decade"]', 'decades', true);
      bindSetToggle('input[data-filter="viewerRating"]', 'viewerRatings');
      bindSetToggle('input[data-filter="criticRating"]', 'criticRatings');

      const awardCb = controls.querySelector('#award-check');
      if (awardCb) awardCb.addEventListener('change', () => { f.awardWinning = awardCb.checked; updateAndSave(); });

      // Tag Pills
      controls.querySelectorAll('.tag-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const filterType = btn.dataset.filter;
          const v = btn.dataset.value;
          let set;
          if (filterType === 'genre') set = f.genres;
          else if (filterType === 'theme') set = f.themes;
          else if (filterType === 'mood') set = f.moods;
          else if (filterType === 'language') set = f.languages;

          set.has(v) ? set.delete(v) : set.add(v);
          btn.classList.toggle('is-active', set.has(v));
          updateAndSave();
        });
      });

      // Year Range Sliders
      const minSl = controls.querySelector('#yr-min-sl');
      const maxSl = controls.querySelector('#yr-max-sl');
      const minIn = controls.querySelector('#yr-min-in');
      const maxIn = controls.querySelector('#yr-max-in');
      if (minSl && maxSl && minIn && maxIn) {
        minSl.addEventListener('input', () => {
          let lo = parseInt(minSl.value, 10);
          let hi = parseInt(maxSl.value, 10);
          if (lo > hi) { lo = hi; minSl.value = lo; }
          minIn.value = lo;
          f.yearMin = lo === meta.yearMin ? null : lo;
          updateAndSave();
        });
        maxSl.addEventListener('input', () => {
          let lo = parseInt(minSl.value, 10);
          let hi = parseInt(maxSl.value, 10);
          if (hi < lo) { hi = lo; maxSl.value = hi; }
          maxIn.value = hi;
          f.yearMax = hi === meta.yearMax ? null : hi;
          updateAndSave();
        });
        minIn.addEventListener('change', () => {
          let lo = parseInt(minIn.value, 10);
          let hi = parseInt(maxIn.value, 10);
          if (isNaN(lo)) lo = meta.yearMin;
          if (lo < meta.yearMin) lo = meta.yearMin;
          if (lo > hi) lo = hi;
          minIn.value = lo;
          minSl.value = lo;
          f.yearMin = lo === meta.yearMin ? null : lo;
          updateAndSave();
        });
        maxIn.addEventListener('change', () => {
          let lo = parseInt(minIn.value, 10);
          let hi = parseInt(maxIn.value, 10);
          if (isNaN(hi)) hi = meta.yearMax;
          if (hi > meta.yearMax) hi = meta.yearMax;
          if (hi < lo) hi = lo;
          maxIn.value = hi;
          maxSl.value = hi;
          f.yearMax = hi === meta.yearMax ? null : hi;
          updateAndSave();
        });
      }

      updateActiveFiltersUI();
    }

    function updateActiveFiltersUI() {
      const f = state.filters;
      const controls = document.getElementById('filter-controls');
      if (!controls) return;

      const updateBadge = (id, count) => {
        const btn = controls.querySelector(`#dd-${id} .dropdown-btn`);
        if (!btn) return;
        const badge = btn.querySelector('.filter-badge');
        if (count > 0) {
          btn.classList.add('is-active');
          badge.style.display = 'inline-block';
          badge.textContent = count;
        } else {
          btn.classList.remove('is-active');
          badge.style.display = 'none';
        }
      };

      updateBadge('decade', f.decades.size);
      updateBadge('viewer', f.viewerRatings.size);
      updateBadge('critic', f.criticRatings.size);
      updateBadge('genre', f.genres.size);
      updateBadge('theme', f.themes.size);
      updateBadge('mood', f.moods.size);
      updateBadge('awards', f.awardWinning ? 1 : 0);

      const yearCount = (f.yearMin !== null || f.yearMax !== null) ? 1 : 0;
      updateBadge('year', yearCount);

      const activeCount = getActiveFilterCount();
      const clearBtn = controls.querySelector('#clear-filters-btn');
      if (clearBtn) {
        clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      }

      const sortBtn = controls.querySelector('#dd-sort .dropdown-btn');
      if (sortBtn) {
        if (state.sort !== 'rating-desc') {
          sortBtn.classList.add('is-active');
        } else {
          sortBtn.classList.remove('is-active');
        }
      }
    }
    /* ═══════════════════════════════════════════════════════════
       MODAL
       ═══════════════════════════════════════════════════════════ */
    let lastFocus = null;

    function openModal(filmId) {
      const film = MOVIES.find(m => m.id === filmId);
      if (!film) return;

      lastFocus = document.activeElement;

      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');

      content.innerHTML = buildModalHTML(film);
      overlay.setAttribute('aria-label', `${film.title} — Film details`);
      overlay.classList.add('is-open');
      document.body.style.overflow = 'hidden';

      content.querySelector('.modal__close').addEventListener('click', closeModal);

      setTimeout(() => {
        const focusable = content.querySelectorAll('button, [href], [tabindex="0"]');
        if (focusable.length) focusable[0].focus();
      }, 50);
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      if (lastFocus) { lastFocus.focus(); lastFocus = null; }
    }

    function buildModalHTML(film) {
      const rc = RATING_COLORS[film.criticRating] || RATING_COLORS['Decent'];

      // Hero background
      const bgUrl = isSafeUrl(film.backdropUrl) ? film.backdropUrl
        : isSafeUrl(film.posterUrl) ? film.posterUrl
          : null;
      const heroBg = bgUrl ? `url('${escHtml(bgUrl)}')` : 'none';

      // Title treatment
      let titleHtml;
      if (isSafeUrl(film.titleLogoUrl)) {
        const fbId = `tl-fb-${escHtml(film.id)}`;
        titleHtml = `
          <h2 class="sr-only">${escHtml(film.title)}</h2>
          <img class="modal__title-logo" src="${escHtml(film.titleLogoUrl)}" alt="${escHtml(film.title)}"
               onerror="this.style.display='none';document.getElementById('${fbId}').style.display='block'">
          <h2 class="modal__title-text" id="${fbId}" style="display:none">${escHtml(film.title)}</h2>`;
      } else {
        titleHtml = `<h2 class="modal__title-text">${escHtml(film.title)}</h2>`;
      }

      // Original title
      let origHtml = '';
      if (film.originalTitle) {
        origHtml = `<div class="modal__orig-title">${escHtml(film.originalTitle)}${film.romanization ? ` <em>${escHtml(film.romanization)}</em>` : ''}</div>`;
      }

      // Tagline
      const taglineHtml = film.tagline
        ? `<p class="modal__tagline">${escHtml(film.tagline)}</p>` : '';

      // Runtime
      const runtimeHtml = (film.runtime || [])
        .map(r => `<span class="modal__runtime-item"><strong>${escHtml(r.version)}</strong> ${escHtml(formatDuration(r.duration))}</span>`)
        .join('<span class="modal__meta-sep">·</span>');

      // Languages & genres
      const langsHtml = (film.languages || []).map(l => `<span class="pill pill--lang">${escHtml(l)}</span>`).join('');
      const genresHtml = (film.genres || []).map(g => `<span class="pill pill--genre">${escHtml(g)}</span>`).join('');

      // Viewer rating
      const vr = film.viewerRating || {};
      const vrSlug = (vr.rating || '').toLowerCase().replace(/[^a-z0-9]/g, '-');
      const viewerHtml = vr.rating ? `
        <div class="modal__viewer-rating">
          <span class="viewer-badge viewer-badge--${vrSlug}">${escHtml(vr.rating)}</span>
          <span class="modal__descriptors">${(vr.descriptors || []).map(escHtml).join(' · ')}</span>
        </div>` : '';

      // Trailer
      const trailerHtml = isSafeUrl(film.trailerUrl) ? `
        <a class="modal__trailer-btn" href="${escHtml(film.trailerUrl)}"
           target="_blank" rel="noopener noreferrer"
           aria-label="Watch trailer for ${escHtml(film.title)} on YouTube">▶ Watch Trailer</a>` : '';

      // Poster
      let posterHtml;
      if (isSafeUrl(film.posterUrl)) {
        posterHtml = `
          <img class="modal__poster" src="${escHtml(film.posterUrl)}" alt="${escHtml(film.title)} poster"
               onerror="this.style.display='none';document.getElementById('mp-fb-${escHtml(film.id)}').style.display='flex'">
          <div class="modal__poster-fallback" id="mp-fb-${escHtml(film.id)}" style="display:none">${escHtml(initial(film.title))}</div>`;
      } else {
        posterHtml = `<div class="modal__poster-fallback">${escHtml(initial(film.title))}</div>`;
      }

      // Cast strip
      const castHtml = (film.cast || []).map((c, i) => buildPersonCard(c.actor, c.role, c.photoUrl, `mc-${film.id}-${i}`, true)).join('');

      // Director strip
      const dirHtml = (film.director || []).map((d, i) => buildPersonCard(d.name, null, d.photoUrl, `md-${film.id}-${i}`, false)).join('');
      const scrHtml = (film.screenplay || []).map((s, i) => buildPersonCard(s.name, null, s.photoUrl, `ms-${film.id}-${i}`, false)).join('');

      // Awards
      let awardsHtml = '';
      if (film.awards && film.awards.length > 0) {
        const byBody = {};
        film.awards.forEach(a => { (byBody[a.body] = byBody[a.body] || []).push(a); });
        const bodyHtml = Object.entries(byBody).map(([body, items]) => `
          <div class="awards-group">
            <h4 class="awards-group__title">${escHtml(body)}</h4>
            ${items.map(a => `
              <div class="award-item award-item--${escHtml(a.result.toLowerCase())}">
                <span class="award-item__icon" aria-hidden="true">${a.result === 'Won' ? '🏆' : '◎'}</span>
                <span class="award-item__info">
                  <span class="award-item__category">${escHtml(a.category)}</span>
                  <span class="award-item__meta">${escHtml(a.result)} · ${escHtml(String(a.year))}</span>
                </span>
              </div>`).join('')}
          </div>`).join('');

        awardsHtml = `
          <section class="modal__awards" aria-label="Awards">
            <h3 class="modal__section-title">Awards &amp; Recognition</h3>
            <div class="awards-grid">${bodyHtml}</div>
          </section>`;
      }

      // Full review
      const review = film.review || {};
      const reviewHtml = review.fullReview
        ? `<div class="modal__review">${renderReviewText(review.fullReview)}</div>` : '';

      const weight = RATING_WEIGHTS[film.criticRating];
      const ratingDisp = weight ? `${film.criticRating} ✦ ${weight}/10` : film.criticRating;

      return `
        <button class="modal__close" aria-label="Close — ${escHtml(film.title)}">✕</button>

        <div class="modal__hero" style="--hero-bg:${heroBg}">
          <div class="modal__hero-bg" aria-hidden="true"></div>
          <div class="modal__hero-inner">
            <div class="modal__poster-col">${posterHtml}</div>
            <div class="modal__info-col">
              <div class="modal__title-wrap">${titleHtml}</div>
              ${origHtml}
              ${taglineHtml}
              <div class="modal__meta-row">
                <span class="modal__year">${escHtml(String(film.year || ''))}</span>
                ${runtimeHtml ? `<span class="modal__meta-sep">·</span>${runtimeHtml}` : ''}
              </div>
              ${langsHtml ? `<div class="modal__pills-row" aria-label="Languages">${langsHtml}</div>` : ''}
              ${genresHtml ? `<div class="modal__pills-row" aria-label="Genres">${genresHtml}</div>` : ''}
              ${viewerHtml}
              ${trailerHtml}
            </div>
          </div>
        </div>

        ${castHtml ? `
        <section class="modal__cast" aria-label="Cast">
          <h3 class="modal__section-title">Cast</h3>
          <div class="modal__cast-scroll">${castHtml}</div>
        </section>` : ''}

        ${(dirHtml || scrHtml) ? `
        <section class="modal__filmmakers" aria-label="Filmmakers">
          ${dirHtml ? `
          <div class="modal__crew-group">
            <h3 class="modal__section-title">Directed by</h3>
            <div class="modal__crew-row">${dirHtml}</div>
          </div>` : ''}
          ${scrHtml ? `
          <div class="modal__crew-group">
            <h3 class="modal__section-title">Written by</h3>
            <div class="modal__crew-row">${scrHtml}</div>
          </div>` : ''}
        </section>` : ''}

        ${awardsHtml}

        <section class="modal__verdict"
                 style="--verdict-color:${rc.text};--verdict-bg:${rc.bg};--verdict-border:${rc.border}"
                 aria-label="Critical verdict">
          <div class="modal__verdict-badge">${escHtml(ratingDisp || '')}</div>
          ${reviewHtml}
        </section>
      `;
    }

    function buildPersonCard(name, role, photoUrl, uid, showRole) {
      let photoHtml;
      if (isSafeUrl(photoUrl)) {
        photoHtml = `
          <img class="person-card__photo" src="${escHtml(photoUrl)}" alt="${escHtml(name)}" loading="lazy"
               onerror="this.style.display='none';document.getElementById('${uid}-fb').style.display='flex'">
          <div class="person-card__fallback" id="${uid}-fb" style="display:none">${escHtml(initial(name))}</div>`;
      } else {
        photoHtml = `<div class="person-card__fallback">${escHtml(initial(name))}</div>`;
      }
      return `
        <div class="person-card">
          <div class="person-card__photo-wrap">${photoHtml}</div>
          <div class="person-card__name">${escHtml(name)}</div>
          ${showRole && role ? `<div class="person-card__role">${escHtml(role)}</div>` : ''}
        </div>`;
    }

    function renderReviewText(text) {
      if (!text) return '';
      return text
        .split(/\n\n+/)
        .map(para => para.trim())
        .filter(Boolean)
        .map(para => `<p>${escHtml(para).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    /* ═══════════════════════════════════════════════════════════
       STATE PERSISTENCE
       ═══════════════════════════════════════════════════════════ */
    function saveState() {
      const f = state.filters;
      try {
        localStorage.setItem('cinephile-vault', JSON.stringify({
          search: state.search,
          sort: state.sort,
          dark: document.documentElement.getAttribute('data-theme') === 'dark',
          filters: {
            decades: [...f.decades],
            yearMin: f.yearMin,
            yearMax: f.yearMax,
            genres: [...f.genres],
            viewerRatings: [...f.viewerRatings],
            criticRatings: [...f.criticRatings],
            awardWinning: f.awardWinning,
            themes: [...f.themes],
            moods: [...f.moods]
          }
        }));
      } catch (e) { }
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem('cinephile-vault') || 'null');
        if (!saved) return;
        state.search = saved.search || '';
        state.sort = saved.sort || 'rating-desc';
        if (saved.dark !== undefined) {
          document.documentElement.setAttribute('data-theme', saved.dark ? 'dark' : 'light');
        }
        const sf = saved.filters || {};
        state.filters.decades = new Set((sf.decades || []).map(Number));
        state.filters.yearMin = sf.yearMin ?? null;
        state.filters.yearMax = sf.yearMax ?? null;
        state.filters.genres = new Set(sf.genres || []);
        state.filters.viewerRatings = new Set(sf.viewerRatings || []);
        state.filters.criticRatings = new Set(sf.criticRatings || []);
        state.filters.awardWinning = !!sf.awardWinning;
        state.filters.themes = new Set(sf.themes || []);
        state.filters.moods = new Set(sf.moods || []);
      } catch (e) { }
    }

    function updateAndSave() {
      updateActiveFiltersUI();
      renderGrid();
      saveState();
    }

    /* ═══════════════════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════════════════ */
    function init() {
      loadState();

      // Collection title
      document.getElementById('collection-title').textContent = COLLECTION_TITLE;
      document.title = COLLECTION_TITLE;

      // Theme toggle icon
      const themeBtn = document.getElementById('theme-toggle');
      themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀';
      themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.textContent = isDark ? '☀' : '☾';
        saveState();
      });

      // Search
      const searchEl = document.getElementById('search-input');
      if (state.search) searchEl.value = state.search;
      let searchTimer;
      searchEl.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.search = e.target.value; updateAndSave(); }, 50);
      });

      // Render controls (which handles sort, filters, etc)
      renderControls();

      // Modal backdrop click
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
      });

      // Keyboard events
      document.addEventListener('keydown', e => {
        const overlay = document.getElementById('modal-overlay');
        const isOpen = overlay.classList.contains('is-open');

        if (e.key === 'Escape' && isOpen) { closeModal(); return; }

        // Focus trap
        if (e.key === 'Tab' && isOpen) {
          const modal = document.getElementById('modal-content');
          const focusable = [...modal.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          )];
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault(); last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault(); first.focus();
          }
        }
      });

      renderGrid();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
