<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cinephile's Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

    /* ═══════════════════════════════════════════════════════════
       CSS VARIABLES
       ═══════════════════════════════════════════════════════════ */
    :root {
      --bg: #070B19;
      --surface: #0B1224;
      --elevated: #111A30;
      --border: #1E293B;
      --accent: #D4AF37;
      --accent-dim: #A8862A;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-tertiary: #64748B;
      --overlay: rgba(7, 11, 25, 0.88);
      --modal-overlay: rgba(7, 11, 25, 0.90);
      --card-hover-overlay: linear-gradient(to top, rgba(7, 11, 25, 0.95) 0%, rgba(7, 11, 25, 0.6) 50%, transparent 100%);
      --shadow-card: 0 10px 40px rgba(0, 0, 0, 0.8);
      --shadow-modal: 0 24px 80px rgba(0, 0, 0, 0.9);
      --radius: 8px;
      --radius-lg: 16px;
      /* Typography */
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-serif: 'Playfair Display', ui-serif, Georgia, serif;
      --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #F1F5F9;
      --elevated: #E2E8F0;
      --border: #CBD5E1;
      --text-primary: #0F172A;
      --text-secondary: #334155;
      --text-tertiary: #64748B;
      --overlay: rgba(248, 250, 252, 0.85);
      --modal-overlay: rgba(15, 23, 42, 0.80);
      --card-hover-overlay: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.5) 50%, transparent 100%);
      --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.15);
      --shadow-modal: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      background-image: url('file:///C:/Users/sabiq/.gemini/antigravity/brain/0ce534b6-254e-4065-b70f-ecff9a768088/abstract_backdrop_1777239587612.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      position: relative;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0.88;
      z-index: -1;
      pointer-events: none;
      transition: background-color 0.3s ease;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    a {
      color: inherit;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    /* ─── Header ────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-theme="dark"] .header {
      background: rgba(7, 11, 25, 0.75);
    }

    [data-theme="light"] .header {
      background: rgba(248, 250, 252, 0.85);
    }

    .header__brand {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .header__title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }

    .header__count {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-wrap {
      width: 260px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      padding: 8px 12px 8px 32px;
      transition: var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
      background: var(--bg);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 175, 55, 0.1);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }

    /* ─── Controls Bar ──────────────────────────────────────── */
    .controls {
      position: sticky;
      top: 60px;
      z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .controls::-webkit-scrollbar {
      display: none;
    }

    [data-theme="dark"] .controls {
      background: rgba(7, 11, 25, 0.75);
    }

    [data-theme="light"] .controls {
      background: rgba(248, 250, 252, 0.85);
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 7px 12px;
      transition: var(--transition);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .dropdown-btn:hover,
    .dropdown-btn.is-active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 175, 55, 0.05);
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 100;
      background: rgba(17, 26, 48, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      min-width: 200px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-5px);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-card);
      max-height: 60vh;
      overflow-y: auto;
    }

    .dropdown-menu.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown--right .dropdown-menu {
      left: auto;
      right: 0;
    }

    .filter-badge {
      background: var(--accent);
      color: #070B19;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 20px;
      line-height: 1.4;
      display: inline-block;
    }

    .clear-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-tertiary);
      font-size: 0.75rem;
      padding: 6px 10px;
      transition: var(--transition);
      cursor: pointer;
    }

    .clear-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .filter-group--full {
      grid-column: 1 / -1;
    }

    .filter-group__title {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.6rem;
    }

    .filter-checks {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .filter-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-check:hover {
      color: var(--text-primary);
    }

    .filter-check input[type="checkbox"] {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 400;
      padding: 4px 10px;
      transition: var(--transition);
      cursor: pointer;
    }

    .tag-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #070B19;
      font-weight: 500;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    /* ─── Custom Filter UI ──────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .filter-checks--grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .filter-badge-toggle {
      cursor: pointer;
    }

    .viewer-badge-ui {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.02);
      transition: var(--transition);
      opacity: 0.6;
    }

    .filter-badge-toggle:hover .viewer-badge-ui {
      opacity: 0.9;
      background: rgba(255, 255, 255, 0.05);
    }

    .filter-badge-toggle input:checked+.viewer-badge-ui {
      opacity: 1;
      border-color: currentColor !important;
      box-shadow: inset 0 0 10px currentColor, 0 0 10px currentColor;
    }

    .filter-row-toggle {
      cursor: pointer;
      display: block;
      margin-bottom: 0.3rem;
    }

    .filter-row-ui {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 4px;
      background: transparent;
      transition: var(--transition);
    }

    .filter-row-toggle:hover .filter-row-ui {
      background: rgba(255, 255, 255, 0.03);
    }

    .filter-row-indicator {
      width: 3px;
      height: 16px;
      border-radius: 2px;
      margin-right: 10px;
      opacity: 0.3;
      transition: var(--transition);
    }

    .filter-row-toggle input:checked+.filter-row-ui {
      background: rgba(255, 255, 255, 0.08);
    }

    .filter-row-toggle input:checked+.filter-row-ui .filter-row-indicator {
      opacity: 1;
      box-shadow: 0 0 8px currentColor;
    }

    .filter-row-label {
      flex-grow: 1;
      font-size: 0.8rem;
      opacity: 0.6;
      transition: var(--transition);
    }

    .filter-row-toggle input:checked+.filter-row-ui .filter-row-label {
      opacity: 1;
      font-weight: 500;
    }

    .critic-score-badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      opacity: 0.5;
    }

    .filter-row-toggle input:checked+.filter-row-ui .critic-score-badge {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      font-weight: 600;
    }

    .toggle-switch-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .toggle-switch-track {
      width: 36px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      position: relative;
      transition: var(--transition);
    }

    .toggle-switch-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text-secondary);
      border-radius: 50%;
      transition: var(--transition);
    }

    .toggle-switch-wrap input:checked+.toggle-switch-track {
      background: rgba(212, 175, 55, 0.3);
    }

    .toggle-switch-wrap input:checked+.toggle-switch-track::after {
      transform: translateX(16px);
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Year Range Slider */
    .year-range {
      padding: 0.25rem 0;
    }

    .year-range__labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .year-range__input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
      padding: 2px 4px;
      width: 60px;
      font-size: 0.8rem;
      text-align: center;
      font-family: inherit;
    }

    .year-range__input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .range-wrap {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .range-slider {
      position: absolute;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      pointer-events: none;
      height: 4px;
    }

    .range-slider::-webkit-slider-runnable-track {
      background: var(--border);
      height: 4px;
      border-radius: 2px;
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      pointer-events: all;
      cursor: pointer;
      margin-top: -6px;
    }

    .range-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      pointer-events: all;
      cursor: pointer;
    }

    /* ─── Main Layout ───────────────────────────────────────── */
    .main {
      padding: 2rem;
    }

    /* ─── Film Grid ─────────────────────────────────────────── */
    .film-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem;
    }

    @media (max-width: 1399px) {
      .film-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 1199px) {
      .film-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 899px) {
      .film-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 599px) {
      .film-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ─── Film Card ─────────────────────────────────────────── */
    .film-card {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      box-shadow: var(--shadow-card);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .film-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.75);
    }

    .film-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .film-card__poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .film-card__fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B1224 0%, #111A30 50%, #070B19 100%);
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: -0.02em;
    }

    .film-card__overlay {
      position: absolute;
      inset: 0;
      background: var(--card-hover-overlay);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.75rem;
    }

    .film-card:hover .film-card__overlay {
      opacity: 1;
    }

    .film-card__badge {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--badge-color, var(--accent));
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      padding: 3px 7px;
      border-radius: 3px;
      border: 1px solid currentColor;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .film-card:hover .film-card__badge {
      opacity: 1;
    }

    .film-card__info {
      position: relative;
      z-index: 1;
    }

    .film-card__title {
      font-family: var(--font-serif);
      font-size: clamp(0.72rem, 1.2vw, 0.95rem);
      font-weight: 600;
      color: #F8FAFC;
      line-height: 1.3;
      margin-bottom: 0.2rem;
    }

    .film-card__title mark {
      background: transparent;
      color: var(--accent);
    }

    .film-card__year {
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ─── Empty State ───────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 6rem 2rem;
      text-align: center;
    }

    .empty-state__symbol {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.3;
      letter-spacing: 0.3em;
    }

    .empty-state__title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .empty-state__sub {
      font-size: 0.875rem;
      color: var(--text-tertiary);
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      padding: 3rem 2rem;
      text-align: center;
      margin-top: 3rem;
      position: relative;
    }

    .footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
    }

    .footer__title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .footer__count {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    .footer__tag {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      margin-top: 0.4rem;
      opacity: 0.6;
    }

    /* ─── Modal Overlay ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-modal);
      position: relative;
      transform: scale(0.96) translateY(20px);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
      margin: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .modal-overlay.is-open .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal__close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      backdrop-filter: blur(4px);
    }

    .modal__close:hover {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
    }

    /* ─── Modal Hero ────────────────────────────────────────── */
    .modal__hero {
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .modal__hero-bg {
      position: absolute;
      inset: -10%;
      background-image: var(--hero-bg);
      background-size: cover;
      background-position: center top;
      filter: blur(8px) brightness(0.35) saturate(1.2);
      transform: scale(1.1);
    }

    .modal__hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(11, 18, 36, 0.6) 60%, var(--surface) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .modal__hero-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 2rem;
      padding: 2.5rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .modal__hero-inner {
        grid-template-columns: 1fr;
        gap: 1.25rem;
        padding: 1.5rem;
      }
    }

    /* Modal Poster */
    .modal__poster-col {
      flex-shrink: 0;
    }

    .modal__poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .modal__poster-fallback {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1714 0%, #252118 100%);
      font-family: var(--font-serif);
      font-size: 4rem;
      font-weight: 600;
      color: var(--text-tertiary);
    }

    /* Modal Info */
    .modal__info-col {
      min-width: 0;
    }

    .modal__title-wrap {
      margin-bottom: 0.4rem;
    }

    .modal__title-logo {
      max-width: 340px;
      max-height: 100px;
      object-fit: contain;
      object-position: left;
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.8)) drop-shadow(0 2px 10px rgba(0, 0, 0, 0.9));
    }

    .modal__title-text {
      font-family: var(--font-serif);
      font-size: 1.85rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fff;
    }

    .modal__orig-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.6rem;
    }

    .modal__orig-title em {
      font-style: italic;
      margin-left: 0.4em;
      font-size: 0.88em;
    }

    .modal__tagline {
      font-style: italic;
      font-size: 0.875rem;
      color: var(--accent);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .modal__meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 0.75rem;
    }

    .modal__meta-sep {
      opacity: 0.4;
    }

    .modal__runtime-item strong {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 400;
      font-size: 0.7em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .modal__pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .pill--lang {
      background: rgba(248, 250, 252, 0.1);
      color: rgba(248, 250, 252, 0.75);
      border: 1px solid rgba(248, 250, 252, 0.15);
      backdrop-filter: blur(4px);
    }

    .pill--genre {
      background: rgba(212, 175, 55, 0.15);
      color: #D4AF37;
      border: 1px solid rgba(212, 175, 55, 0.25);
      backdrop-filter: blur(4px);
    }

    .modal__viewer-rating {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.6rem 0;
    }

    .viewer-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1.5px solid;
    }

    .viewer-badge--u {
      color: #10B981;
      border-color: #10B981;
      background: rgba(16, 185, 129, 0.1);
    }

    .viewer-badge--pg {
      color: #3B82F6;
      border-color: #3B82F6;
      background: rgba(59, 130, 246, 0.1);
    }

    .viewer-badge--t-13 {
      color: #F59E0B;
      border-color: #F59E0B;
      background: rgba(245, 158, 11, 0.1);
    }

    .viewer-badge--m-16 {
      color: #F97316;
      border-color: #F97316;
      background: rgba(249, 115, 22, 0.1);
    }

    .viewer-badge--r-18 {
      color: #EF4444;
      border-color: #EF4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .viewer-badge--x {
      color: #991B1B;
      border-color: #991B1B;
      background: rgba(153, 27, 27, 0.12);
    }

    .modal__descriptors {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
    }

    .modal__trailer-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #070B19;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: var(--radius);
      text-decoration: none;
      margin-top: 0.75rem;
      transition: var(--transition);
      letter-spacing: 0.02em;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .modal__trailer-btn:hover {
      background: var(--text-primary);
      color: #070B19;
      box-shadow: 0 6px 20px rgba(248, 250, 252, 0.4);
    }

    /* ─── Modal Sections ────────────────────────────────────── */
    .modal__cast,
    .modal__filmmakers,
    .modal__awards,
    .modal__verdict {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
    }

    .modal__section-title {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
    }

    .modal__filmmakers {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .modal__crew-group {
      flex: 1;
      min-width: 160px;
    }

    .modal__crew-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* Cast scroll */
    .modal__cast-scroll {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .modal__cast-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .modal__cast-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal__cast-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Person Cards */
    .person-card {
      flex-shrink: 0;
      text-align: center;
      width: 88px;
    }

    .person-card__photo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 0.5rem;
      background: var(--elevated);
      position: relative;
    }

    .person-card__photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .person-card__photo--crew {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    .person-card__photo-wrap--crew {
      width: 80px;
      height: 80px;
    }

    .person-card__fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--elevated), var(--border));
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-tertiary);
      border-radius: 50%;
    }

    .person-card__name {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.15rem;
    }

    .person-card__role {
      font-size: 0.65rem;
      font-style: italic;
      color: var(--text-tertiary);
      line-height: 1.3;
    }

    .person-card .person-card__photo-wrap {
      width: 88px;
      height: 88px;
    }

    /* ─── Awards Panel ──────────────────────────────────────── */
    .modal__awards {
      background: rgba(212, 175, 55, 0.05);
      border-top: 1px solid var(--border);
      border-left: 3px solid rgba(212, 175, 55, 0.4);
      padding-left: calc(2rem - 3px);
    }

    .awards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem 3rem;
    }

    .awards-group {
      min-width: 200px;
    }

    .awards-group__title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.6rem;
    }

    .award-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .award-item__icon {
      font-size: 0.75rem;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .award-item--nominated .award-item__icon {
      filter: grayscale(1);
      opacity: 0.5;
    }

    .award-item__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .award-item__category {
      font-size: 0.8rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .award-item--nominated .award-item__category {
      color: var(--text-secondary);
    }

    .award-item__meta {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    .award-item--won .award-item__category {
      font-weight: 500;
    }

    /* ─── Critic Verdict ────────────────────────────────────── */
    .modal__verdict {
      background: var(--elevated);
      border-left: 3px solid var(--verdict-border, var(--accent));
      padding-left: calc(2rem - 3px);
    }

    .modal__verdict-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--verdict-color, var(--accent));
      background: var(--verdict-bg, rgba(212, 175, 55, 0.1));
      border: 1.5px solid var(--verdict-border, var(--accent));
      padding: 5px 14px;
      border-radius: 3px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
    }

    .modal__review {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.88;
      color: var(--text-primary);
      max-width: 68ch;
    }

    .modal__review p {
      margin-bottom: 1.25em;
    }

    .modal__review p:last-child {
      margin-bottom: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — TABLET (≤ 768px)
       ═══════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* ── Header: stack vertically ── */
      .header {
        flex-wrap: wrap;
        height: auto;
        padding: 0.75rem 1rem;
        gap: 0.5rem;
      }

      .header__brand {
        flex: 1 1 auto;
        min-width: 0;
      }

      .header__actions {
        flex: 0 0 auto;
        gap: 0.5rem;
      }

      .search-wrap {
        width: 180px;
      }

      .search-input {
        font-size: 0.8rem;
        padding: 6px 10px 6px 28px;
      }

      .search-icon {
        font-size: 0.75rem;
        left: 9px;
      }

      /* ── Controls: horizontal scroll instead of wrapping ── */
      .controls {
        padding: 0.5rem 1rem;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 0.5rem;
      }

      .controls::-webkit-scrollbar {
        display: none;
      }

      .dropdown-btn {
        font-size: 0.72rem;
        padding: 5px 10px;
      }

      /* ── Mobile dropdown bottom-sheet (moved to body by JS) ── */
      .mobile-dropdown-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9998;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .mobile-dropdown-backdrop.is-visible {
        opacity: 1;
      }

      .dropdown-menu.mobile-sheet {
        position: fixed !important;
        top: auto !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        border-radius: 16px 16px 0 0;
        max-height: 70vh;
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        padding: 1.25rem;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6);
      }

      /* ── Main content ── */
      .main {
        padding: 0.75rem;
      }

      .film-grid {
        gap: 0.5rem;
        grid-template-columns: repeat(3, 1fr);
      }

      /* ── Film cards: show overlay on touch ── */
      .film-card__overlay {
        opacity: 1;
        background: linear-gradient(to top, rgba(7, 11, 25, 0.9) 0%, transparent 60%);
        padding: 0.5rem;
      }

      .film-card__badge {
        opacity: 1;
        font-size: 0.5rem;
        padding: 2px 5px;
      }

      .film-card__title {
        font-size: 0.7rem;
      }

      .film-card__year {
        font-size: 0.6rem;
      }

      /* ── Modal: full-screen on mobile ── */
      .modal-overlay {
        padding: 0;
        align-items: stretch;
      }

      .modal-content {
        border-radius: 0;
        margin: 0;
        max-width: 100%;
        max-height: 100vh;
        overflow-y: auto;
      }

      .modal__close {
        top: 0.75rem;
        right: 0.75rem;
        width: 28px;
        height: 28px;
        font-size: 0.75rem;
      }

      /* ── Modal hero: stack poster on top of info ── */
      .modal__hero {
        min-height: auto;
      }

      .modal__hero-inner {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1.25rem;
      }

      .modal__poster-col {
        display: flex;
        justify-content: center;
      }

      .modal__poster {
        width: 140px;
        max-width: 50%;
      }

      .modal__poster-fallback {
        width: 140px;
        max-width: 50%;
      }

      .modal__title-logo {
        max-width: 220px;
        max-height: 60px;
      }

      .modal__title-text {
        font-size: 1.35rem;
      }

      .modal__orig-title {
        font-size: 0.85rem;
      }

      .modal__tagline {
        font-size: 0.8rem;
      }

      .modal__meta-row {
        font-size: 0.72rem;
        gap: 0.3rem;
      }

      .pill {
        font-size: 0.62rem;
        padding: 2px 7px;
      }

      /* ── Modal sections ── */
      .modal__cast,
      .modal__filmmakers,
      .modal__awards,
      .modal__verdict {
        padding: 1rem;
      }

      .modal__section-title {
        font-size: 0.58rem;
        margin-bottom: 0.75rem;
      }

      .modal__filmmakers {
        flex-direction: column;
        gap: 1rem;
      }

      /* ── Cast cards: smaller on mobile ── */
      .person-card {
        width: 72px;
      }

      .person-card__photo-wrap {
        width: 72px;
        height: 72px;
      }

      .person-card__name {
        font-size: 0.62rem;
      }

      .person-card__role {
        font-size: 0.55rem;
      }

      .person-card .person-card__photo-wrap {
        width: 72px;
        height: 72px;
      }

      /* ── Awards ── */
      .awards-grid {
        gap: 1rem 1.5rem;
      }

      .awards-group {
        min-width: 0;
        width: 100%;
      }

      .awards-group__title {
        font-size: 0.62rem;
      }

      .award-item__category {
        font-size: 0.72rem;
      }

      /* ── Verdict / Review ── */
      .modal__verdict-badge {
        font-size: 0.6rem;
        padding: 4px 10px;
        margin-bottom: 1rem;
      }

      .modal__review {
        font-size: 0.88rem;
        line-height: 1.75;
      }

      /* ── Footer ── */
      .footer {
        padding: 2rem 1rem;
        margin-top: 2rem;
      }

      .footer__title {
        font-size: 0.95rem;
      }

      .footer__tag {
        font-size: 0.72rem;
      }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — SMALL PHONE (≤ 480px)
       ═══════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {

      /* ── Header: full stack ── */
      .header {
        flex-direction: column;
        align-items: stretch;
        padding: 0.6rem 0.75rem;
        gap: 0.4rem;
      }

      .header__brand {
        justify-content: space-between;
        width: 100%;
      }

      .header__title {
        font-size: 1rem;
      }

      .header__count {
        font-size: 0.6rem;
        padding: 1px 6px;
      }

      .header__actions {
        width: 100%;
        justify-content: stretch;
      }

      .search-wrap {
        flex: 1;
        width: auto;
      }

      .btn-icon {
        width: 32px;
        height: 32px;
        font-size: 0.85rem;
      }

      /* ── Controls ── */
      .controls {
        gap: 0.4rem;
        padding: 0.4rem 0.75rem;
      }

      .dropdown-btn {
        font-size: 0.68rem;
        padding: 4px 8px;
      }

      /* ── Main ── */
      .main {
        padding: 0.5rem;
      }

      .film-grid {
        gap: 0.4rem;
      }

      .film-card__overlay {
        padding: 0.4rem;
      }

      .film-card__title {
        font-size: 0.62rem;
      }

      .film-card__year {
        font-size: 0.55rem;
      }

      .film-card__badge {
        font-size: 0.45rem;
        padding: 1px 4px;
        top: 0.35rem;
        right: 0.35rem;
      }

      /* ── Modal ── */
      .modal__hero-inner {
        padding: 1rem;
        gap: 0.75rem;
      }

      .modal__poster {
        width: 120px;
      }

      .modal__poster-fallback {
        width: 120px;
      }

      .modal__title-text {
        font-size: 1.15rem;
      }

      .modal__cast,
      .modal__filmmakers,
      .modal__awards,
      .modal__verdict {
        padding: 0.75rem;
      }

      .person-card {
        width: 64px;
      }

      .person-card__photo-wrap {
        width: 64px;
        height: 64px;
      }

      .person-card .person-card__photo-wrap {
        width: 64px;
        height: 64px;
      }

      .person-card__name {
        font-size: 0.58rem;
      }

      .person-card__role {
        font-size: 0.5rem;
      }

      .modal__review {
        font-size: 0.82rem;
        line-height: 1.7;
      }

      .filter-grid {
        padding: 0.75rem;
        gap: 0.75rem;
      }
    }

    /* ═══════════════════════════════════════════════════════════
       TOUCH DEVICE HINTS
       ═══════════════════════════════════════════════════════════ */
    @media (hover: none) and (pointer: coarse) {

      /* On touch devices, always show card info overlay */
      .film-card__overlay {
        opacity: 1;
        background: linear-gradient(to top, rgba(7, 11, 25, 0.85) 0%, transparent 55%);
      }

      .film-card__badge {
        opacity: 1;
      }

      /* Disable hover transform on touch */
      .film-card:hover {
        transform: none;
      }
    }
  </style>
</head>

<body>

  <!-- ─── Header ────────────────────────────── -->
  <header class="header">
    <div class="header__brand">
      <h1 class="header__title" id="collection-title">My Collection</h1>
      <span class="header__count"><span id="film-count">0</span> film<span id="film-count-plural">s</span></span>
    </div>
    <div class="header__actions">
      <div class="search-wrap" role="search">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input type="search" class="search-input" id="search-input" placeholder="Search films, directors, cast, themes…"
          aria-label="Search the collection" autocomplete="off" spellcheck="false">
      </div>
      <button class="btn-icon" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">☾</button>
    </div>
  </header>

  <!-- ─── Controls Bar ──────────────────────── -->
  <div class="controls" id="filter-controls" role="toolbar" aria-label="Filter and Sort controls">
    <!-- Populated by JS -->
  </div>

  <!-- ─── Main Grid ─────────────────────────── -->
  <main class="main">
    <div class="film-grid" id="film-grid" role="list" aria-label="Film collection"></div>
  </main>

  <!-- ─── Footer ───────────────────────────── -->
  <footer class="footer">
    <div class="footer__title" id="footer-title">The Cinephile's Vault</div>
    <p class="footer__count" id="footer-count">Showing 0 of 0 films</p>
    <p class="footer__tag">The Cinephile's Vault — a permanent record of serious watching</p>
  </footer>

  <!-- ─── Modal ────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Film details">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- ─── Collection Data (external) ────── -->
  <script src="movies.js"></script>

  <script>
    const COLLECTION_TITLE = "The Cinephile's Vault";

    /* ═══════════════════════════════════════════════════════════
       CONSTANTS
       ═══════════════════════════════════════════════════════════ */
    const RATING_WEIGHTS = {
      'Masterpiece': 10, 'Exceptional': 9, 'Great': 8, 'Solid': 7, 'Decent': 6,
      'Mediocre': 5, 'Flawed': 4, 'Poor': 3, 'Awful': 2, 'Abysmal': 1
    };

    const RATING_COLORS = {
      'Masterpiece': { text: '#D4AF37', bg: 'rgba(212,175,55,0.12)', border: '#D4AF37' },
      'Exceptional': { text: '#4ADE80', bg: 'rgba(74,222,128,0.10)', border: '#4ADE80' },
      'Great': { text: '#22C55E', bg: 'rgba(34,197,94,0.10)', border: '#22C55E' },
      'Solid': { text: '#059669', bg: 'rgba(5,150,105,0.10)', border: '#059669' },
      'Decent': { text: '#38BDF8', bg: 'rgba(56,189,248,0.10)', border: '#38BDF8' },
      'Mediocre': { text: '#94A3B8', bg: 'rgba(148,163,184,0.10)', border: '#94A3B8' },
      'Flawed': { text: '#F97316', bg: 'rgba(249,115,22,0.10)', border: '#F97316' },
      'Poor': { text: '#EF4444', bg: 'rgba(239,68,68,0.10)', border: '#EF4444' },
      'Awful': { text: '#DC2626', bg: 'rgba(220,38,38,0.10)', border: '#DC2626' },
      'Abysmal': { text: '#991B1B', bg: 'rgba(153,27,27,0.10)', border: '#991B1B' }
    };

    const BADGE_COLORS = {
      'Masterpiece': '#D4AF37',
      'Exceptional': '#4ADE80',
      'Great': '#22C55E',
      'Solid': '#059669',
      'Decent': '#38BDF8',
      'Mediocre': '#94A3B8',
      'Flawed': '#F97316',
      'Poor': '#EF4444',
      'Awful': '#DC2626',
      'Abysmal': '#991B1B'
    };

    /* ═══════════════════════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════════════════════ */
    let state = {
      search: '',
      sort: 'rating-desc',
      filterPanelOpen: false,
      filters: {
        decades: new Set(),
        yearMin: null,
        yearMax: null,
        genres: new Set(),
        viewerRatings: new Set(),
        criticRatings: new Set(),
        awardWinning: false,
        themes: new Set(),
        moods: new Set(),
        languages: new Set()
      }
    };

    /* ═══════════════════════════════════════════════════════════
       UTILITIES
       ═══════════════════════════════════════════════════════════ */
    function normalize(str) {
      return String(str ?? '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function stripArticle(title) {
      return String(title ?? '').replace(/^(the |a |an )/i, '');
    }

    function formatDuration(dur) {
      if (!dur) return '';
      const [h, m] = dur.split(':');
      const hours = parseInt(h, 10);
      const mins = parseInt(m, 10);
      if (hours === 0) return `${mins}m`;
      return mins === 0 ? `${hours}h` : `${hours}h ${mins}m`;
    }

    function initial(name) {
      return String(name ?? '?').trim().charAt(0).toUpperCase();
    }

    function isSafeUrl(url) {
      return typeof url === 'string' && url.startsWith('https://');
    }

    /* ═══════════════════════════════════════════════════════════
       COLLECTION META (auto-derived from MOVIES)
       ═══════════════════════════════════════════════════════════ */
    function getCollectionMeta() {
      if (MOVIES.length === 0) {
        return { decades: [], yearMin: 1900, yearMax: new Date().getFullYear(), genres: [], themes: [], moods: [], languages: [] };
      }
      const years = MOVIES.map(m => m.year).filter(Boolean);
      const yearMin = Math.min(...years);
      const yearMax = Math.max(...years);
      const decades = [...new Set(years.map(y => Math.floor(y / 10) * 10))].sort((a, b) => a - b);
      const genres = [...new Set(MOVIES.flatMap(m => m.genres || []))].sort();
      const themes = [...new Set(MOVIES.flatMap(m => m.review?.themes || []))].sort();
      const moods = [...new Set(MOVIES.flatMap(m => m.review?.mood || []))].sort();
      const languages = [...new Set(MOVIES.flatMap(m => m.languages || []))].sort();
      return { decades, yearMin, yearMax, genres, themes, moods, languages };
    }

    /* ═══════════════════════════════════════════════════════════
       FILTER / SEARCH / SORT PIPELINE
       ═══════════════════════════════════════════════════════════ */
    function getFilteredMovies() {
      let films = [...MOVIES];
      const f = state.filters;

      // ── Search ──
      if (state.search) {
        const q = normalize(state.search);
        films = films.filter(m => {
          const fields = [
            m.title, m.originalTitle, m.romanization, m.tagline,
            ...(m.director || []).map(d => d.name),
            ...(m.screenplay || []).map(s => s.name),
            ...(m.cast || []).flatMap(c => [c.actor, c.role]),
            String(m.year),
            ...(m.genres || []),
            ...(m.awards || []).flatMap(a => [a.body, a.category]),
            ...(m.review?.themes || []),
            m.review?.mood,
            m.review?.standoutWork,
            ...(m.review?.comparisons || [])
          ].filter(Boolean);
          return fields.some(fld => normalize(fld).includes(q));
        });
      }

      // ── Decade ──
      if (f.decades.size > 0) {
        films = films.filter(m => f.decades.has(Math.floor(m.year / 10) * 10));
      }

      // ── Year range ──
      if (f.yearMin !== null) films = films.filter(m => m.year >= f.yearMin);
      if (f.yearMax !== null) films = films.filter(m => m.year <= f.yearMax);

      // ── Genre ──
      if (f.genres.size > 0) {
        films = films.filter(m => {
          const filmGenres = m.genres || [];
          return [...f.genres].every(g => filmGenres.includes(g));
        });
      }

      // ── Viewer rating ──
      if (f.viewerRatings.size > 0) {
        films = films.filter(m => f.viewerRatings.has(m.viewerRating?.rating));
      }

      // ── Critic rating ──
      if (f.criticRatings.size > 0) {
        films = films.filter(m => f.criticRatings.has(m.criticRating));
      }

      // ── Award-winning ──
      if (f.awardWinning) {
        films = films.filter(m => (m.awards || []).some(a => a.result === 'Won'));
      }

      // ── Theme ──
      if (f.themes.size > 0) {
        films = films.filter(m => {
          const filmThemes = m.review?.themes || [];
          return [...f.themes].every(t => filmThemes.includes(t));
        });
      }

      // ── Mood ──
      if (f.moods.size > 0) {
        films = films.filter(m => {
          const filmMoods = [].concat(m.review?.mood || []);
          return [...f.moods].every(md => filmMoods.includes(md));
        });
      }

      // ── Language ──
      if (f.languages.size > 0) {
        films = films.filter(m => {
          const filmLangs = m.languages || [];
          return [...f.languages].every(l => filmLangs.includes(l));
        });
      }

      // ── Sort ──
      films.sort((a, b) => {
        switch (state.sort) {
          case 'alpha-asc': return stripArticle(a.title).localeCompare(stripArticle(b.title));
          case 'alpha-desc': return stripArticle(b.title).localeCompare(stripArticle(a.title));
          case 'year-asc': return (a.year || 0) - (b.year || 0);
          case 'year-desc': return (b.year || 0) - (a.year || 0);
          case 'rating-asc': return (RATING_WEIGHTS[a.criticRating] || 0) - (RATING_WEIGHTS[b.criticRating] || 0);
          case 'rating-desc': return (RATING_WEIGHTS[b.criticRating] || 0) - (RATING_WEIGHTS[a.criticRating] || 0);
          default: return 0;
        }
      });

      return films;
    }

    function getActiveFilterCount() {
      const f = state.filters;
      let n = 0;
      if (f.decades.size > 0) n++;
      if (f.yearMin !== null || f.yearMax !== null) n++;
      if (f.genres.size > 0) n++;
      if (f.viewerRatings.size > 0) n++;
      if (f.criticRatings.size > 0) n++;
      if (f.awardWinning) n++;
      if (f.themes.size > 0) n++;
      if (f.moods.size > 0) n++;
      if (f.languages.size > 0) n++;
      return n;
    }

    /* ═══════════════════════════════════════════════════════════
       GRID RENDERING
       ═══════════════════════════════════════════════════════════ */
    function renderGrid() {
      const films = getFilteredMovies();
      const grid = document.getElementById('film-grid');
      const footerCount = document.getElementById('footer-count');
      const activeCount = getActiveFilterCount();

      const clearBtn = document.getElementById('clear-filters-btn');
      if (clearBtn) {
        clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      }

      const total = MOVIES.length;
      footerCount.textContent = total === 0
        ? 'The vault is empty'
        : `Showing ${films.length} of ${total} film${total !== 1 ? 's' : ''}`;

      // Update film count in header
      document.getElementById('film-count').textContent = total;
      document.getElementById('film-count-plural').textContent = total === 1 ? '' : 's';

      grid.innerHTML = '';

      if (films.length === 0) {
        renderEmptyState(grid);
        return;
      }

      const q = state.search ? normalize(state.search) : '';
      films.forEach(film => grid.appendChild(buildCard(film, q)));
    }

    function renderEmptyState(container) {
      const div = document.createElement('div');
      div.className = 'empty-state';
      if (MOVIES.length === 0) {
        div.innerHTML = `
          <div class="empty-state__symbol">⬛ ⬜ ⬛</div>
          <h2 class="empty-state__title">The vault awaits its first film.</h2>
          <p class="empty-state__sub">Add a title to begin the collection.</p>
        `;
      } else {
        div.innerHTML = `
          <div class="empty-state__symbol">◌</div>
          <h2 class="empty-state__title">No films match.</h2>
          <p class="empty-state__sub">Try narrowing your search or clearing a filter.</p>
        `;
      }
      container.appendChild(div);
    }

    function highlightMatch(text, q) {
      if (!q) return escHtml(text);
      const norm = normalize(text);
      const idx = norm.indexOf(q);
      if (idx === -1) return escHtml(text);
      return escHtml(text.slice(0, idx))
        + `<mark>${escHtml(text.slice(idx, idx + q.length))}</mark>`
        + escHtml(text.slice(idx + q.length));
    }

    function buildCard(film, q) {
      const card = document.createElement('article');
      card.className = 'film-card';
      card.setAttribute('role', 'listitem');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${film.title} (${film.year}), ${film.criticRating}`);

      const badgeColor = BADGE_COLORS[film.criticRating] || '#8a8680';
      const weight = RATING_WEIGHTS[film.criticRating];
      const ratingDisp = weight ? `${film.criticRating} ✦ ${weight}/10` : film.criticRating;

      let posterHtml;
      if (isSafeUrl(film.posterUrl)) {
        const fid = `pf-${film.id}`;
        posterHtml = `
          <img class="film-card__poster" src="${escHtml(film.posterUrl)}"
               alt="${escHtml(film.title)} poster" loading="lazy"
               onerror="this.style.display='none';document.getElementById('${fid}').style.display='flex'">
          <div class="film-card__fallback" id="${fid}" style="display:none">${escHtml(initial(film.title))}</div>
        `;
      } else {
        posterHtml = `<div class="film-card__fallback">${escHtml(initial(film.title))}</div>`;
      }

      const titleHtml = q ? highlightMatch(film.title, q) : escHtml(film.title);

      card.innerHTML = `
        ${posterHtml}
        <div class="film-card__overlay" aria-hidden="true">
          <div class="film-card__badge" style="--badge-color:${escHtml(badgeColor)}">${escHtml(ratingDisp || '')}</div>
          <div class="film-card__info">
            <h3 class="film-card__title">${titleHtml}</h3>
            <span class="film-card__year">${escHtml(String(film.year || ''))}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => openModal(film.id));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(film.id); }
      });

      return card;
    }

    /* ═══════════════════════════════════════════════════════════
       FILTER PANEL
       ═══════════════════════════════════════════════════════════ */
    function renderControls() {
      const meta = getCollectionMeta();
      const controls = document.getElementById('filter-controls');
      const f = state.filters;

      const curMin = f.yearMin !== null ? f.yearMin : meta.yearMin;
      const curMax = f.yearMax !== null ? f.yearMax : meta.yearMax;

      const VIEWER_RATINGS = ['U', 'PG', 'T-13', 'M-16', 'R-18', 'X'];
      const CRITIC_RATINGS = ['Masterpiece', 'Exceptional', 'Great', 'Solid', 'Decent', 'Mediocre', 'Flawed', 'Poor', 'Awful', 'Abysmal'];

      const sortOptions = [
        { id: 'alpha-asc', label: 'A–Z' },
        { id: 'alpha-desc', label: 'Z–A' },
        { id: 'year-asc', label: 'Year ↑' },
        { id: 'year-desc', label: 'Year ↓' },
        { id: 'rating-asc', label: 'Rating ↑' },
        { id: 'rating-desc', label: 'Rating ↓' }
      ];

      const buildDropdown = (id, label, contentHtml, rightAlign = false) => `
        <div class="dropdown ${rightAlign ? 'dropdown--right' : ''}" id="dd-${id}">
          <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">
            ${label} <span class="filter-badge" style="display:none"></span>
          </button>
          <div class="dropdown-menu">
            ${contentHtml}
          </div>
        </div>
      `;

      // Sort
      const sortHtml = `
        <div class="filter-checks">
          ${sortOptions.map(o => `
            <label class="filter-check">
              <input type="radio" name="sort" value="${o.id}" ${state.sort === o.id ? 'checked' : ''}>
              <span>${o.label}</span>
            </label>
          `).join('')}
        </div>`;
      let html = buildDropdown('sort', 'Sort By', sortHtml);

      // Decades
      if (meta.decades.length > 0) {
        const decHtml = `
          <div class="filter-checks">
            ${meta.decades.map(d => `
              <label class="filter-check">
                <input type="checkbox" value="${d}" ${f.decades.has(d) ? 'checked' : ''} data-filter="decade">
                <span>${d}s</span>
              </label>`).join('')}
          </div>`;
        html += buildDropdown('decade', 'Decade', decHtml);
      }

      // Year Range
      if (MOVIES.length > 1) {
        const yrHtml = `
          <div class="year-range">
            <div class="year-range__labels">
              <input type="number" id="yr-min-in" class="year-range__input" min="${meta.yearMin}" max="${meta.yearMax}" value="${curMin}" aria-label="Minimum Year">
              <span style="display:flex; align-items:center; color:var(--text-secondary); font-size:0.75rem;">to</span>
              <input type="number" id="yr-max-in" class="year-range__input" min="${meta.yearMin}" max="${meta.yearMax}" value="${curMax}" aria-label="Maximum Year">
            </div>
            <div class="range-wrap">
              <input type="range" class="range-slider" id="yr-min-sl" min="${meta.yearMin}" max="${meta.yearMax}" value="${curMin}">
              <input type="range" class="range-slider" id="yr-max-sl" min="${meta.yearMin}" max="${meta.yearMax}" value="${curMax}">
            </div>
          </div>`;
        html += buildDropdown('year', 'Year Range', yrHtml);
      }

      // Viewer Rating
      const VIEWER_COLORS = { 'U': '#10B981', 'PG': '#3B82F6', 'T-13': '#F59E0B', 'M-16': '#F97316', 'R-18': '#EF4444', 'X': '#991B1B' };
      const vrHtml = `
        <div class="filter-checks filter-checks--grid">
          ${VIEWER_RATINGS.map(r => `
            <label class="filter-badge-toggle">
              <input type="checkbox" value="${r}" ${f.viewerRatings.has(r) ? 'checked' : ''} data-filter="viewerRating" class="sr-only">
              <span class="viewer-badge-ui" style="border-color:${escHtml(VIEWER_COLORS[r] || 'transparent')}; color:${escHtml(VIEWER_COLORS[r] || 'inherit')}">${r}</span>
            </label>`).join('')}
        </div>`;
      html += buildDropdown('viewer', 'Viewer Rating', vrHtml);

      // Critic Rating
      const crHtml = `
        <div class="filter-checks filter-checks--2col">
          ${CRITIC_RATINGS.map(r => {
        const w = RATING_WEIGHTS[r];
        const dispRating = w ? `<span class="critic-score-badge">✦ ${w}/10</span>` : '';
        const color = (RATING_COLORS[r] || {}).text || 'inherit';
        return `
              <label class="filter-row-toggle">
                <input type="checkbox" value="${r}" ${f.criticRatings.has(r) ? 'checked' : ''} data-filter="criticRating" class="sr-only">
                <div class="filter-row-ui">
                  <div class="filter-row-indicator" style="background:${escHtml(color)}"></div>
                  <span class="filter-row-label" style="color:${escHtml(color)}">${r}</span>
                  ${dispRating}
                </div>
              </label>`;
      }).join('')}
        </div>`;
      html += buildDropdown('critic', 'Critic Rating', crHtml);

      // Awards
      const awHtml = `
        <label class="toggle-switch-wrap">
          <input type="checkbox" id="award-check" ${f.awardWinning ? 'checked' : ''} data-filter="awardWinning" class="sr-only">
          <div class="toggle-switch-track"></div>
          <span>Award-winning only</span>
        </label>`;
      html += buildDropdown('awards', 'Awards', awHtml);

      // Genre
      if (meta.genres.length > 0) {
        const gnHtml = `
          <div class="tag-cloud">
            ${meta.genres.map(g => `
              <button class="tag-pill ${f.genres.has(g) ? 'is-active' : ''}" data-filter="genre" data-value="${escHtml(g)}">${escHtml(g)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('genre', 'Genre', gnHtml);
      }

      // Theme
      if (meta.themes.length > 0) {
        const thHtml = `
          <div class="tag-cloud">
            ${meta.themes.map(t => `
              <button class="tag-pill ${f.themes.has(t) ? 'is-active' : ''}" data-filter="theme" data-value="${escHtml(t)}">${escHtml(t)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('theme', 'Theme', thHtml, true);
      }

      // Mood
      if (meta.moods.length > 0) {
        const mdHtml = `
          <div class="tag-cloud">
            ${meta.moods.map(m => `
              <button class="tag-pill ${f.moods.has(m) ? 'is-active' : ''}" data-filter="mood" data-value="${escHtml(m)}">${escHtml(m)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('mood', 'Mood', mdHtml, true);
      }

      // Language
      if (meta.languages.length > 0) {
        const lgHtml = `
          <div class="tag-cloud">
            ${meta.languages.map(l => `
              <button class="tag-pill ${f.languages.has(l) ? 'is-active' : ''}" data-filter="language" data-value="${escHtml(l)}">${escHtml(l)}</button>
            `).join('')}
          </div>`;
        html += buildDropdown('language', 'Language', lgHtml, true);
      }

      // Clear button
      html += `<button class="clear-btn" id="clear-filters-btn" aria-label="Clear all filters">✕ Clear</button>`;

      controls.innerHTML = html;

      // --- Attach Events ---

      // Dropdown Toggles
      const isMobile = () => window.innerWidth <= 768;

      function closeMobileSheet() {
        const backdrop = document.querySelector('.mobile-dropdown-backdrop');
        const sheet = document.querySelector('.dropdown-menu.mobile-sheet');
        if (backdrop) {
          backdrop.classList.remove('is-visible');
          setTimeout(() => backdrop.remove(), 200);
        }
        if (sheet) {
          const origParent = sheet._origParent;
          sheet.classList.remove('mobile-sheet', 'is-open');
          if (origParent) origParent.appendChild(sheet);
          sheet._origParent = null;
        }
        document.querySelectorAll('.dropdown-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));
      }

      function closeAllDropdowns() {
        closeMobileSheet();
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('is-open'));
        document.querySelectorAll('.dropdown-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));
      }

      document.querySelectorAll('.dropdown').forEach(dropdown => {
        const btn = dropdown.querySelector('.dropdown-btn');
        const menu = dropdown.querySelector('.dropdown-menu');

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpen = menu.classList.contains('is-open') || menu.classList.contains('mobile-sheet');

          closeAllDropdowns();

          if (!isOpen) {
            if (isMobile()) {
              // Move menu to body as a bottom sheet
              menu._origParent = menu.parentElement;
              const backdrop = document.createElement('div');
              backdrop.className = 'mobile-dropdown-backdrop';
              backdrop.addEventListener('click', closeAllDropdowns);
              document.body.appendChild(backdrop);
              document.body.appendChild(menu);
              menu.classList.add('mobile-sheet', 'is-open');
              requestAnimationFrame(() => backdrop.classList.add('is-visible'));
            } else {
              menu.classList.add('is-open');
            }
            btn.setAttribute('aria-expanded', 'true');
          }
        });

        menu.addEventListener('click', e => e.stopPropagation());
      });

      // Close dropdowns on outside click
      document.addEventListener('click', () => {
        closeAllDropdowns();
      });

      // Clear Filters
      const clearBtn = controls.querySelector('#clear-filters-btn');
      const activeCount = getActiveFilterCount();
      clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      clearBtn.addEventListener('click', () => {
        state.filters = {
          decades: new Set(), yearMin: null, yearMax: null,
          genres: new Set(), viewerRatings: new Set(), criticRatings: new Set(),
          awardWinning: false, themes: new Set(), moods: new Set(), languages: new Set()
        };
        renderControls();
        updateAndSave();
      });

      // Sort Input
      controls.querySelectorAll('input[name="sort"]').forEach(rb => {
        rb.addEventListener('change', () => {
          state.sort = rb.value;
          updateAndSave();
        });
      });

      // Checkbox Inputs
      const bindSetToggle = (selector, setKey, isInt = false) => {
        controls.querySelectorAll(selector).forEach(cb => {
          cb.addEventListener('change', () => {
            const v = isInt ? parseInt(cb.value, 10) : cb.value;
            cb.checked ? f[setKey].add(v) : f[setKey].delete(v);
            updateAndSave();
          });
        });
      };

      bindSetToggle('input[data-filter="decade"]', 'decades', true);
      bindSetToggle('input[data-filter="viewerRating"]', 'viewerRatings');
      bindSetToggle('input[data-filter="criticRating"]', 'criticRatings');

      const awardCb = controls.querySelector('#award-check');
      if (awardCb) awardCb.addEventListener('change', () => { f.awardWinning = awardCb.checked; updateAndSave(); });

      // Tag Pills
      controls.querySelectorAll('.tag-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const filterType = btn.dataset.filter;
          const v = btn.dataset.value;
          let set;
          if (filterType === 'genre') set = f.genres;
          else if (filterType === 'theme') set = f.themes;
          else if (filterType === 'mood') set = f.moods;
          else if (filterType === 'language') set = f.languages;

          set.has(v) ? set.delete(v) : set.add(v);
          btn.classList.toggle('is-active', set.has(v));
          updateAndSave();
        });
      });

      // Year Range Sliders
      const minSl = controls.querySelector('#yr-min-sl');
      const maxSl = controls.querySelector('#yr-max-sl');
      const minIn = controls.querySelector('#yr-min-in');
      const maxIn = controls.querySelector('#yr-max-in');
      if (minSl && maxSl && minIn && maxIn) {
        minSl.addEventListener('input', () => {
          let lo = parseInt(minSl.value, 10);
          let hi = parseInt(maxSl.value, 10);
          if (lo > hi) { lo = hi; minSl.value = lo; }
          minIn.value = lo;
          f.yearMin = lo === meta.yearMin ? null : lo;
          updateAndSave();
        });
        maxSl.addEventListener('input', () => {
          let lo = parseInt(minSl.value, 10);
          let hi = parseInt(maxSl.value, 10);
          if (hi < lo) { hi = lo; maxSl.value = hi; }
          maxIn.value = hi;
          f.yearMax = hi === meta.yearMax ? null : hi;
          updateAndSave();
        });
        minIn.addEventListener('change', () => {
          let lo = parseInt(minIn.value, 10);
          let hi = parseInt(maxIn.value, 10);
          if (isNaN(lo)) lo = meta.yearMin;
          if (lo < meta.yearMin) lo = meta.yearMin;
          if (lo > hi) lo = hi;
          minIn.value = lo;
          minSl.value = lo;
          f.yearMin = lo === meta.yearMin ? null : lo;
          updateAndSave();
        });
        maxIn.addEventListener('change', () => {
          let lo = parseInt(minIn.value, 10);
          let hi = parseInt(maxIn.value, 10);
          if (isNaN(hi)) hi = meta.yearMax;
          if (hi > meta.yearMax) hi = meta.yearMax;
          if (hi < lo) hi = lo;
          maxIn.value = hi;
          maxSl.value = hi;
          f.yearMax = hi === meta.yearMax ? null : hi;
          updateAndSave();
        });
      }

      updateActiveFiltersUI();
    }

    function updateActiveFiltersUI() {
      const f = state.filters;
      const controls = document.getElementById('filter-controls');
      if (!controls) return;

      const updateBadge = (id, count) => {
        const btn = controls.querySelector(`#dd-${id} .dropdown-btn`);
        if (!btn) return;
        const badge = btn.querySelector('.filter-badge');
        if (count > 0) {
          btn.classList.add('is-active');
          badge.style.display = 'inline-block';
          badge.textContent = count;
        } else {
          btn.classList.remove('is-active');
          badge.style.display = 'none';
        }
      };

      updateBadge('decade', f.decades.size);
      updateBadge('viewer', f.viewerRatings.size);
      updateBadge('critic', f.criticRatings.size);
      updateBadge('genre', f.genres.size);
      updateBadge('theme', f.themes.size);
      updateBadge('mood', f.moods.size);
      updateBadge('awards', f.awardWinning ? 1 : 0);

      const yearCount = (f.yearMin !== null || f.yearMax !== null) ? 1 : 0;
      updateBadge('year', yearCount);

      const activeCount = getActiveFilterCount();
      const clearBtn = controls.querySelector('#clear-filters-btn');
      if (clearBtn) {
        clearBtn.style.display = activeCount > 0 ? 'inline-flex' : 'none';
      }

      const sortBtn = controls.querySelector('#dd-sort .dropdown-btn');
      if (sortBtn) {
        if (state.sort !== 'rating-desc') {
          sortBtn.classList.add('is-active');
        } else {
          sortBtn.classList.remove('is-active');
        }
      }
    }
    /* ═══════════════════════════════════════════════════════════
       MODAL
       ═══════════════════════════════════════════════════════════ */
    let lastFocus = null;

    function openModal(filmId) {
      const film = MOVIES.find(m => m.id === filmId);
      if (!film) return;

      lastFocus = document.activeElement;

      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');

      content.innerHTML = buildModalHTML(film);
      overlay.setAttribute('aria-label', `${film.title} — Film details`);
      overlay.classList.add('is-open');
      document.body.style.overflow = 'hidden';

      content.querySelector('.modal__close').addEventListener('click', closeModal);

      setTimeout(() => {
        const focusable = content.querySelectorAll('button, [href], [tabindex="0"]');
        if (focusable.length) focusable[0].focus();
      }, 50);
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
      if (lastFocus) { lastFocus.focus(); lastFocus = null; }
    }

    function buildModalHTML(film) {
      const rc = RATING_COLORS[film.criticRating] || RATING_COLORS['Decent'];

      // Hero background
      const bgUrl = isSafeUrl(film.backdropUrl) ? film.backdropUrl
        : isSafeUrl(film.posterUrl) ? film.posterUrl
          : null;
      const heroBg = bgUrl ? `url('${escHtml(bgUrl)}')` : 'none';

      // Title treatment
      let titleHtml;
      if (isSafeUrl(film.titleLogoUrl)) {
        const fbId = `tl-fb-${escHtml(film.id)}`;
        titleHtml = `
          <h2 class="sr-only">${escHtml(film.title)}</h2>
          <img class="modal__title-logo" src="${escHtml(film.titleLogoUrl)}" alt="${escHtml(film.title)}"
               onerror="this.style.display='none';document.getElementById('${fbId}').style.display='block'">
          <h2 class="modal__title-text" id="${fbId}" style="display:none">${escHtml(film.title)}</h2>`;
      } else {
        titleHtml = `<h2 class="modal__title-text">${escHtml(film.title)}</h2>`;
      }

      // Original title
      let origHtml = '';
      if (film.originalTitle) {
        origHtml = `<div class="modal__orig-title">${escHtml(film.originalTitle)}${film.romanization ? ` <em>${escHtml(film.romanization)}</em>` : ''}</div>`;
      }

      // Tagline
      const taglineHtml = film.tagline
        ? `<p class="modal__tagline">${escHtml(film.tagline)}</p>` : '';

      // Runtime
      const runtimeHtml = (film.runtime || [])
        .map(r => `<span class="modal__runtime-item"><strong>${escHtml(r.version)}</strong> ${escHtml(formatDuration(r.duration))}</span>`)
        .join('<span class="modal__meta-sep">·</span>');

      // Languages & genres
      const langsHtml = (film.languages || []).map(l => `<span class="pill pill--lang">${escHtml(l)}</span>`).join('');
      const genresHtml = (film.genres || []).map(g => `<span class="pill pill--genre">${escHtml(g)}</span>`).join('');

      // Viewer rating
      const vr = film.viewerRating || {};
      const vrSlug = (vr.rating || '').toLowerCase().replace(/[^a-z0-9]/g, '-');
      const viewerHtml = vr.rating ? `
        <div class="modal__viewer-rating">
          <span class="viewer-badge viewer-badge--${vrSlug}">${escHtml(vr.rating)}</span>
          <span class="modal__descriptors">${(vr.descriptors || []).map(escHtml).join(' · ')}</span>
        </div>` : '';

      // Trailer
      const trailerHtml = isSafeUrl(film.trailerUrl) ? `
        <a class="modal__trailer-btn" href="${escHtml(film.trailerUrl)}"
           target="_blank" rel="noopener noreferrer"
           aria-label="Watch trailer for ${escHtml(film.title)} on YouTube">▶ Watch Trailer</a>` : '';

      // Poster
      let posterHtml;
      if (isSafeUrl(film.posterUrl)) {
        posterHtml = `
          <img class="modal__poster" src="${escHtml(film.posterUrl)}" alt="${escHtml(film.title)} poster"
               onerror="this.style.display='none';document.getElementById('mp-fb-${escHtml(film.id)}').style.display='flex'">
          <div class="modal__poster-fallback" id="mp-fb-${escHtml(film.id)}" style="display:none">${escHtml(initial(film.title))}</div>`;
      } else {
        posterHtml = `<div class="modal__poster-fallback">${escHtml(initial(film.title))}</div>`;
      }

      // Cast strip
      const castHtml = (film.cast || []).map((c, i) => buildPersonCard(c.actor, c.role, c.photoUrl, `mc-${film.id}-${i}`, true)).join('');

      // Director strip
      const dirHtml = (film.director || []).map((d, i) => buildPersonCard(d.name, null, d.photoUrl, `md-${film.id}-${i}`, false)).join('');
      const scrHtml = (film.screenplay || []).map((s, i) => buildPersonCard(s.name, null, s.photoUrl, `ms-${film.id}-${i}`, false)).join('');

      // Awards
      let awardsHtml = '';
      if (film.awards && film.awards.length > 0) {
        const byBody = {};
        film.awards.forEach(a => { (byBody[a.body] = byBody[a.body] || []).push(a); });
        const bodyHtml = Object.entries(byBody).map(([body, items]) => `
          <div class="awards-group">
            <h4 class="awards-group__title">${escHtml(body)}</h4>
            ${items.map(a => `
              <div class="award-item award-item--${escHtml(a.result.toLowerCase())}">
                <span class="award-item__icon" aria-hidden="true">${a.result === 'Won' ? '🏆' : '◎'}</span>
                <span class="award-item__info">
                  <span class="award-item__category">${escHtml(a.category)}</span>
                  <span class="award-item__meta">${escHtml(a.result)} · ${escHtml(String(a.year))}</span>
                </span>
              </div>`).join('')}
          </div>`).join('');

        awardsHtml = `
          <section class="modal__awards" aria-label="Awards">
            <h3 class="modal__section-title">Awards &amp; Recognition</h3>
            <div class="awards-grid">${bodyHtml}</div>
          </section>`;
      }

      // Full review
