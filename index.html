      const review = film.review || {};
      const reviewHtml = review.fullReview
        ? `<div class="modal__review">${renderReviewText(review.fullReview)}</div>` : '';

      const weight = RATING_WEIGHTS[film.criticRating];
      const ratingDisp = weight ? `${film.criticRating} ✦ ${weight}/10` : film.criticRating;

      return `
        <button class="modal__close" aria-label="Close — ${escHtml(film.title)}">✕</button>

        <div class="modal__hero" style="--hero-bg:${heroBg}">
          <div class="modal__hero-bg" aria-hidden="true"></div>
          <div class="modal__hero-inner">
            <div class="modal__poster-col">${posterHtml}</div>
            <div class="modal__info-col">
              <div class="modal__title-wrap">${titleHtml}</div>
              ${origHtml}
              ${taglineHtml}
              <div class="modal__meta-row">
                <span class="modal__year">${escHtml(String(film.year || ''))}</span>
                ${runtimeHtml ? `<span class="modal__meta-sep">·</span>${runtimeHtml}` : ''}
              </div>
              ${langsHtml ? `<div class="modal__pills-row" aria-label="Languages">${langsHtml}</div>` : ''}
              ${genresHtml ? `<div class="modal__pills-row" aria-label="Genres">${genresHtml}</div>` : ''}
              ${viewerHtml}
              ${trailerHtml}
            </div>
          </div>
        </div>

        ${castHtml ? `
        <section class="modal__cast" aria-label="Cast">
          <h3 class="modal__section-title">Cast</h3>
          <div class="modal__cast-scroll">${castHtml}</div>
        </section>` : ''}

        ${(dirHtml || scrHtml) ? `
        <section class="modal__filmmakers" aria-label="Filmmakers">
          ${dirHtml ? `
          <div class="modal__crew-group">
            <h3 class="modal__section-title">Directed by</h3>
            <div class="modal__crew-row">${dirHtml}</div>
          </div>` : ''}
          ${scrHtml ? `
          <div class="modal__crew-group">
            <h3 class="modal__section-title">Written by</h3>
            <div class="modal__crew-row">${scrHtml}</div>
          </div>` : ''}
        </section>` : ''}

        ${awardsHtml}

        <section class="modal__verdict"
                 style="--verdict-color:${rc.text};--verdict-bg:${rc.bg};--verdict-border:${rc.border}"
                 aria-label="Critical verdict">
          <div class="modal__verdict-badge">${escHtml(ratingDisp || '')}</div>
          ${reviewHtml}
        </section>
      `;
    }

    function buildPersonCard(name, role, photoUrl, uid, showRole) {
      let photoHtml;
      if (isSafeUrl(photoUrl)) {
        photoHtml = `
          <img class="person-card__photo" src="${escHtml(photoUrl)}" alt="${escHtml(name)}" loading="lazy"
               onerror="this.style.display='none';document.getElementById('${uid}-fb').style.display='flex'">
          <div class="person-card__fallback" id="${uid}-fb" style="display:none">${escHtml(initial(name))}</div>`;
      } else {
        photoHtml = `<div class="person-card__fallback">${escHtml(initial(name))}</div>`;
      }
      return `
        <div class="person-card">
          <div class="person-card__photo-wrap">${photoHtml}</div>
          <div class="person-card__name">${escHtml(name)}</div>
          ${showRole && role ? `<div class="person-card__role">${escHtml(role)}</div>` : ''}
        </div>`;
    }

    function renderReviewText(text) {
      if (!text) return '';
      return text
        .split(/\n\n+/)
        .map(para => para.trim())
        .filter(Boolean)
        .map(para => `<p>${escHtml(para).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    /* ═══════════════════════════════════════════════════════════
       STATE PERSISTENCE
       ═══════════════════════════════════════════════════════════ */
    function saveState() {
      const f = state.filters;
      try {
        localStorage.setItem('cinephile-vault', JSON.stringify({
          search: state.search,
          sort: state.sort,
          dark: document.documentElement.getAttribute('data-theme') === 'dark',
          filters: {
            decades: [...f.decades],
            yearMin: f.yearMin,
            yearMax: f.yearMax,
            genres: [...f.genres],
            viewerRatings: [...f.viewerRatings],
            criticRatings: [...f.criticRatings],
            awardWinning: f.awardWinning,
            themes: [...f.themes],
            moods: [...f.moods]
          }
        }));
      } catch (e) { }
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem('cinephile-vault') || 'null');
        if (!saved) return;
        state.search = saved.search || '';
        state.sort = saved.sort || 'rating-desc';
        if (saved.dark !== undefined) {
          document.documentElement.setAttribute('data-theme', saved.dark ? 'dark' : 'light');
        }
        const sf = saved.filters || {};
        state.filters.decades = new Set((sf.decades || []).map(Number));
        state.filters.yearMin = sf.yearMin ?? null;
        state.filters.yearMax = sf.yearMax ?? null;
        state.filters.genres = new Set(sf.genres || []);
        state.filters.viewerRatings = new Set(sf.viewerRatings || []);
        state.filters.criticRatings = new Set(sf.criticRatings || []);
        state.filters.awardWinning = !!sf.awardWinning;
        state.filters.themes = new Set(sf.themes || []);
        state.filters.moods = new Set(sf.moods || []);
      } catch (e) { }
    }

    function updateAndSave() {
      updateActiveFiltersUI();
      renderGrid();
      saveState();
    }

    /* ═══════════════════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════════════════ */
    function init() {
      loadState();

      // Collection title
      document.getElementById('collection-title').textContent = COLLECTION_TITLE;
      document.title = COLLECTION_TITLE;

      // Theme toggle icon
      const themeBtn = document.getElementById('theme-toggle');
      themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀';
      themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.textContent = isDark ? '☀' : '☾';
        saveState();
      });

      // Search
      const searchEl = document.getElementById('search-input');
      if (state.search) searchEl.value = state.search;
      let searchTimer;
      searchEl.addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { state.search = e.target.value; updateAndSave(); }, 50);
      });

      // Render controls (which handles sort, filters, etc)
      renderControls();

      // Modal backdrop click
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
      });

      // Keyboard events
      document.addEventListener('keydown', e => {
        const overlay = document.getElementById('modal-overlay');
        const isOpen = overlay.classList.contains('is-open');

        if (e.key === 'Escape' && isOpen) { closeModal(); return; }

        // Focus trap
        if (e.key === 'Tab' && isOpen) {
          const modal = document.getElementById('modal-content');
          const focusable = [...modal.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          )];
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault(); last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault(); first.focus();
          }
        }
      });

      renderGrid();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
